{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>🧠 知识超图</h2>
  <p style="color:var(--dim)">知识超图通过沉默突触和成熟的神经连接，存储小树学到的所有知识。</p>
  <div class="metric"><span>实体数量</span><span>—</span></div>
  <div class="metric"><span>超边数量</span><span>—</span></div>
  <div class="metric"><span>关系类型</span><span>—</span></div>
</div>

<!-- P6: Knowledge graph interactive exploration -->
<div class="card" style="margin-top:16px">
  <h2>🗺️ 交互式知识图谱探索</h2>
  <p style="color:var(--dim);font-size:12px;margin-bottom:12px">
    LLM 生成可交互的知识图谱节点。点击关联按钮即可展开探索。</p>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <input id="kg-search" placeholder="输入知识实体名称..."
           style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px"
           @keydown.enter="searchKG()">
    <button @click="searchKG()">🔍 探索</button>
  </div>
  <div id="kg-graph" style="max-height:55vh;overflow-y:auto">
    <div style="color:var(--dim);font-size:12px">
      试试搜索: <span class="kg-preset" onclick="presetSearch('DeepSeek')">DeepSeek</span> ·
      <span class="kg-preset" onclick="presetSearch('神经网络')">神经网络</span> ·
      <span class="kg-preset" onclick="presetSearch('强化学习')">强化学习</span> ·
      <span class="kg-preset" onclick="presetSearch('HTMX')">HTMX</span>
    </div>
  </div>
</div>

<!-- P3: CoT visualization -->
<div class="card" style="margin-top:16px">
  <h2>🧠 思维链推理</h2>
  <p style="color:var(--dim);font-size:12px;margin-bottom:12px">
    输入问题查看逐步推理树</p>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <input id="kb-cot-q" placeholder="输入推理问题..."
           style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px">
    <button onclick="startKBCot()" style="font-size:12px;padding:10px 16px">推理</button>
  </div>
  <div id="kb-cot-tree"></div>
</div>

<!-- Knowledge search -->
<div class="card" style="margin-top:16px">
  <h2>🔍 搜索知识</h2>
  <form hx-post="/tree/chat/msg" hx-target="#kb-result" hx-swap="innerHTML">
    <input name="message" placeholder="搜索知识库..." />
    <button type="submit" style="margin-top:8px">搜索</button>
  </form>
  <div id="kb-result" style="margin-top:12px"></div>
</div>

<!-- Health poll -->
<div class="card" style="margin-top:16px">
  <h2>📊 知识统计</h2>
  <div hx-get="/tree/health" hx-trigger="load, every 60s" hx-swap="innerHTML">
    <div class="panel">加载中...</div>
  </div>
</div>

<script>
function searchKG() {
  const entity = document.getElementById('kg-search').value.trim();
  if (!entity) return;
  const graph = document.getElementById('kg-graph');
  graph.innerHTML = '<div style="color:var(--accent);font-size:12px">🗺️ 探索中...</div>';
  fetch('/tree/kg/explore', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({entity: entity}),
  })
  .then(r => r.text())
  .then(html => { graph.innerHTML = html + graph.innerHTML.replace('探索中...',''); })
  .catch(e => { graph.innerHTML = '<div style="color:var(--err)">探索失败</div>'; });
}

function presetSearch(entity) {
  document.getElementById('kg-search').value = entity;
  searchKG();
}

function startKBCot() {
  const q = document.getElementById('kb-cot-q').value.trim();
  if (!q) return;
  const tree = document.getElementById('kb-cot-tree');
  tree.innerHTML = '<div style="color:var(--accent);font-size:12px">🧠 推理中...</div>';
  const evtSource = new EventSource('/tree/sse/cot?question=' + encodeURIComponent(q));
  let stepCount = 0;
  evtSource.addEventListener('cot-step', function(e) {
    const data = JSON.parse(e.data);
    if (data.html && data.step > stepCount) {
      stepCount = data.step;
      const div = document.createElement('div');
      div.innerHTML = data.html;
      tree.appendChild(div.firstElementChild);
    }
  });
  evtSource.addEventListener('cot-done', function(e) {
    evtSource.close();
  });
  evtSource.addEventListener('cot-error', function(e) {
    tree.innerHTML = '<div style="color:var(--err)">推理出错</div>';
    evtSource.close();
  });
}
</script>

<style>
.kg-preset { color: var(--accent); cursor: pointer; text-decoration: underline; }
.kg-preset:hover { color: #6af; }
</style>
{% endblock %}
