<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 — LivingTree</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-50 flex items-center justify-center">
<div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm mx-4">
  <div class="text-center mb-6">
    <div class="text-5xl mb-3">🌳</div>
    <h1 class="text-xl font-bold text-gray-800">LivingTree AI Agent</h1>
    <p class="text-sm text-gray-400 mt-1">企业微信统一登录</p>
  </div>
  <button onclick="doOAuthLogin()" class="w-full flex items-center justify-center gap-2 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium text-sm transition-colors mb-3">
    <svg width="18" height="18" viewBox="0 0 20 20"><rect x="2" y="3" width="16" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M6 8h8M6 11h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    企业微信登录
  </button>
  <div class="flex items-center gap-3 my-4">
    <div class="flex-1 h-px bg-gray-200"></div>
    <span class="text-xs text-gray-400">或</span>
    <div class="flex-1 h-px bg-gray-200"></div>
  </div>
  <button onclick="toggleQR()" class="w-full flex items-center justify-center gap-2 py-3 border border-gray-200 hover:bg-gray-50 rounded-xl font-medium text-sm text-gray-600 transition-colors">
    <svg width="18" height="18" viewBox="0 0 20 20"><rect x="3" y="3" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="3" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="11" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="13" width="4" height="4" rx="1" fill="currentColor"/></svg>
    扫码登录
  </button>
  <div id="qr-wrap" class="hidden mt-4 text-center">
    <div class="w-48 h-48 mx-auto bg-white rounded-xl p-2 border border-gray-100 flex items-center justify-center"><span class="text-3xl animate-pulse">📱</span></div>
    <p class="text-xs text-gray-400 mt-2">请使用企业微信扫描</p>
  </div>
  <p class="text-xs text-gray-300 text-center mt-6">仅限企业用户 · 企微客户端内自动登录</p>
</div>
<script src="services/login.js"></script>
<script>function toggleQR(){document.getElementById('qr-wrap').classList.toggle('hidden')}</script>
</body>
</html>
