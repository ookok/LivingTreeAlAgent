<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🌳 LivingTree AI Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="importmap">
{"imports": {"monaco-editor": "https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/esm/vs/editor/editor.main.js"}}
</script>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="components/sidebar/sidebar.css">
<link rel="stylesheet" href="components/chat/chat.css">
<link rel="stylesheet" href="components/input/input.css">
<link rel="stylesheet" href="components/code-editor/code-editor.css">
<script src="js/living-a2ui.js" defer></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="resizer" id="resizer"></div>
  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-toggle" onclick="toggleSidebar()"><svg width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="1.5" rx="0.75" fill="currentColor"/><rect x="2" y="7" width="12" height="1.5" rx="0.75" fill="currentColor"/><rect x="2" y="11" width="9" height="1.5" rx="0.75" fill="currentColor"/></svg></button>
        <span class="topbar-title" id="topbar-title">LivingTree AI Agent</span>
        <button onclick="pickFolder()" title="选择本地文件夹" style="background:none;border:1px solid var(--border-secondary);color:var(--text-secondary);padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;margin-left:8px">📁</button>
        <span id="folder-path" style="font-size:10px;color:var(--text-secondary);margin-left:4px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      </div>
      <div class="topbar-right">
        <button onclick="clearPanel()" title="清空面板" style="background:none;border:1px solid var(--border-secondary);color:var(--text-secondary);padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;margin-right:8px">🗑</button>
        <span id="presence-text" style="font-size:11px;color:var(--accent-coral);margin-right:8px;opacity:0.7"></span>
        <span id="shield-indicator" style="font-size:11px;margin-right:8px;cursor:pointer" title="提示注入防护" onclick="fetch('/tree/admin/shield').then(r=>r.text()).then(h=>{var d=document.createElement('div');d.textContent='🛡️ '+h;d.style.cssText='position:fixed;top:40px;right:16px;z-index:500;max-width:400px;padding:8px;background:var(--bg-secondary);border:1px solid var(--border-secondary);border-radius:4px;font-size:12px';document.body.appendChild(d);setTimeout(function(){d.remove()},8000)})">🛡️</span>
        <button onclick="document.getElementById('evo-panel').classList.toggle('hidden')" title="自进化面板" style="background:none;border:1px solid var(--border-secondary);color:var(--text-secondary);padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;margin-right:8px">🧬</button>
        <button onclick="LT.emit('code-editor:toggle')" title="代码编辑器"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 4l3 3-3 3M8 11h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/></svg></button>
        <button onclick="toggleRightPanel()" title="上下文"><svg width="14" height="14" viewBox="0 0 14 14"><rect x="1.5" y="2.5" width="11" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.3"/><line x1="8.5" y1="2.5" x2="8.5" y2="11.5" stroke="currentColor" stroke-width="1.3"/></svg></button>
      </div>
    </header>
    <div id="chat-area" class="chat-area"></div>
    <div class="input-area"></div>
    <div id="cognition-panel" style="display:none;padding:8px 16px;background:var(--bg-secondary);border-top:1px solid var(--border-secondary);font-size:11px;color:var(--text-secondary);max-height:150px;overflow-y:auto"></div>
  </main>
  <aside class="context-panel" id="context-panel"></aside>
  <div id="evo-panel" class="hidden" style="position:fixed;top:40px;right:16px;z-index:400;max-width:480px;max-height:80vh;overflow-y:auto;background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,.12)"></div>
</div>

<script>
// Load evolution panel on demand
document.querySelector('button[onclick*="evo-panel"]').addEventListener('click',function(){
  var el=document.getElementById('evo-panel');
  if(!el.dataset.loaded){
    fetch('/static/evolution.html').then(r=>r.text()).then(h=>{el.innerHTML=h;el.dataset.loaded='1';});
  }
});
</script>

<!-- Shell slots for non-main components -->
<div id="dashboard" style="display:none"></div>
<div id="settings-modal" class="modal-overlay" style="display:none"></div>
<div id="models-modal" class="modal-overlay" style="display:none"></div>
<div id="doc-reader-modal" class="modal-overlay" style="display:none"></div>
<div id="notifications" class="notif-container"></div>
<div id="user-dropdown" class="user-dropdown" style="display:none"></div>
<div id="boot-overlay" class="boot-overlay"></div>
<div id="ctx-menu" class="ctx-menu" style="display:none"></div>

<!-- Code Editor Panel -->
<div class="modal-overlay" id="editor-panel" style="display:none" onclick="if(event.target===this)LT.emit('code-editor:toggle')">
  <div class="modal-panel" style="width:95vw;height:90vh;max-width:1200px">
    <div class="modal-header">
      <span class="modal-title">代码编辑器</span>
      <button class="modal-close" onclick="LT.emit('code-editor:toggle')"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
    </div>
    <div class="modal-body" style="padding:0;overflow:hidden" id="editor-panel-body"></div>
  </div>
</div>

<!-- Core -->
<script src="core/framework.js?v=5"></script>
<!-- Services -->
<script src="services/store.js?v=5"></script>
<script src="services/api.js?v=5"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0/marked.min.js"></script>
<script src="services/renderer.js?v=5"></script>
<script src="js/slash-commands.js?v=2"></script>
<!-- Components -->
<script src="components/boot-overlay/boot-overlay.js?v=4"></script>
<script src="components/sidebar/sidebar.js?v=4"></script>
<script src="components/dashboard/dashboard.js?v=4"></script>
<script src="components/chat/chat.js?v=4"></script>
<script src="components/input/input.js?v=4"></script>
<script src="components/context-panel/context-panel.js?v=4"></script>
<script src="components/settings/settings.js?v=4"></script>
<script src="components/doc-reader/doc-reader.js?v=4"></script>
<script src="components/notifications/notifications.js?v=4"></script>
<script src="components/user-menu/user-menu.js?v=4"></script>
<script src="components/code-editor/code-editor.js?v=4"></script>
<script src="components/models/models.js?v=4"></script>
<!-- Bootstrap -->
<script src="app.js?v=4"></script>

<!-- Pseudo-upload drop zone -->
<div id="drop-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;flex-direction:column" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="event.preventDefault();this.classList.remove('dragover');handleDrop(event.dataTransfer.files[0])" onclick="if(event.target===this)this.style.display='none'">
  <div style="width:400px;height:200px;border:2px dashed var(--brand-default);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;pointer-events:none">
    <span style="font-size:36px">📥</span>
    <span style="font-size:14px;color:var(--text)">拖拽文件到此处</span>
    <span style="font-size:11px;color:var(--text-secondary)">txt/md/pdf/docx/csv · 音频 · 视频 · 仅提取文字, 文件不保存</span>
  </div>
</div>
<script>
document.addEventListener('paste',async function(e){
  var f=e.clipboardData.files[0]; if(!f)return; handleDrop(f);
});
function handleDrop(file){
  if(!file)return;
  if(file.size>50*1024*1024){alert('文件过大 (>50MB)');return;}
  var ov=document.getElementById('drop-overlay'); ov.style.display='flex';
  var r=new FileReader();
  r.onload=function(){
    fetch('/api/knowledge/ingest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:r.result.split(',')[1]||r.result,filename:file.name,mime_type:file.type})})
    .then(function(r){return r.json()}).then(function(d){
      var el=ov.querySelector('div');
      if(d.ok){
        el.innerHTML='<span style=font-size:36px>✅</span><span style=font-size:14px;color:var(--text)>已摄入: '+LT.esc(d.title||'')+'</span><span style=font-size:11px;color:var(--text-secondary)>'+LT.esc(String(d.word_count||''))+'词 · '+LT.esc(d.source_format||'')+' · '+LT.esc(String(d.parse_time_ms||''))+'ms</span>';
      }else{
        el.textContent='❌ '+(d.error||'未知错误');
      }
      setTimeout(function(){ov.style.display='none'},2500);
    });
  };
  r.readAsDataURL(file);
}
</script>
</body>
</html>
