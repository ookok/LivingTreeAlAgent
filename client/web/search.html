<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>搜索 — LivingTree</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-50">
<div class="max-w-2xl mx-auto px-4 py-12">
  <div class="text-center mb-8">
    <div class="text-4xl mb-2">🌳</div>
    <h1 class="text-2xl font-bold text-gray-800">LivingTree 搜索</h1>
    <p class="text-sm text-gray-400 mt-1">代码 · 文档 · 知识库 · 网络</p>
  </div>

  <!-- Search box -->
  <div class="flex bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all">
    <input id="search-input" placeholder="搜索代码、文档、知识..." class="flex-1 px-4 py-3 text-sm outline-none bg-transparent"
      onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium transition-colors flex items-center gap-2">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      搜索
    </button>
  </div>

  <!-- Source tabs -->
  <div class="flex gap-2 justify-center mt-4 flex-wrap">
    <button onclick="setSource('all')" class="source-btn px-4 py-1.5 rounded-full text-xs font-medium bg-blue-600 text-white">全部</button>
    <button onclick="setSource('code')" class="source-btn px-4 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">代码</button>
    <button onclick="setSource('docs')" class="source-btn px-4 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">文档</button>
    <button onclick="setSource('kb')" class="source-btn px-4 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">知识库</button>
  </div>

  <!-- Results -->
  <div id="results" class="mt-6 space-y-3"></div>
</div>

<script>
let currentSource = 'all';
function setSource(s) {
  currentSource = s;
  document.querySelectorAll('.source-btn').forEach(b => {
    b.className = b.textContent.trim().toLowerCase().includes(s) || (s==='all' && b.textContent.trim()==='全部')
      ? 'source-btn px-4 py-1.5 rounded-full text-xs font-medium bg-blue-600 text-white'
      : 'source-btn px-4 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600 hover:bg-gray-200';
  });
}
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const el = document.getElementById('results');
  el.innerHTML = '<div class="text-center py-8"><div class="w-6 h-6 animate-spin rounded-full border-2 border-gray-300 border-t-blue-600 mx-auto"></div></div>';
  try {
    const r = await fetch('/api/search?q='+encodeURIComponent(q)+'&source='+currentSource);
    const d = await r.json();
    if (!d.results || !d.results.length) { el.innerHTML = '<div class="text-center py-8 text-gray-400 text-sm">未找到结果</div>'; return; }
    el.innerHTML = d.results.map(item => `
      <div class="bg-white rounded-xl shadow-sm p-4 hover:shadow-md transition-shadow">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-xs px-2 py-0.5 rounded-full bg-blue-50 text-blue-600">${item.source||'?'}</span>
          <span class="text-xs text-gray-400">${item.file||''}</span>
        </div>
        <h3 class="text-sm font-medium text-gray-800">${item.title||item.name||''}</h3>
        <p class="text-xs text-gray-500 mt-1 line-clamp-2">${item.snippet||item.content||''}</p>
      </div>
    `).join('');
  } catch(e) { el.innerHTML = '<div class="text-red-500 text-sm text-center py-4">搜索失败</div>'; }
}
</script>
</body>
</html>
