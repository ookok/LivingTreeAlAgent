<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🌳 LivingTree AI Agent</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="components/code-editor/code-editor.css">
<!-- Auth check -->
<script>
(function(){var t=localStorage.getItem('lt_token');if(!t){var r=encodeURIComponent(location.href);location.href='/login.html?redirect='+r}})();
</script>
<!-- AntV X6 Graph -->
<script src="https://unpkg.com/@antv/x6@2.18.1/dist/x6.min.js"></script>
<!-- Monaco Editor AMD loader -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="resizer" id="resizer"></div>
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="topbar-toggle" onclick="toggleSidebar()"><svg width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="1.5" rx="0.75" fill="currentColor"/><rect x="2" y="7" width="12" height="1.5" rx="0.75" fill="currentColor"/><rect x="2" y="11" width="9" height="1.5" rx="0.75" fill="currentColor"/></svg></button>
          <span class="topbar-title" id="topbar-title">LivingTree AI Agent</span>
        </div>
        <div class="topbar-right">
          <button class="theme-toggle-btn" onclick="LT.store.toggleTheme()" title="切换主题">🌓</button>
          <button onclick="OnlyOffice.toggleSplit()" title="分屏文档" id="btn-split"><svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="2" width="5" height="10" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="8" y="2" width="5" height="10" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.2"/></svg></button>
          <button onclick="toggleGraphStudio()" title="可视化控制台"><svg width="14" height="14" viewBox="0 0 14 14"><circle cx="4" cy="4" r="2" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="10" cy="4" r="2" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="7" cy="10" r="2" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M5.5 5.5L8 9M11 5l-3 3.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg></button>
          <button onclick="LT.emit('code-editor:toggle')" title="代码编辑器"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 4l3 3-3 3M8 11h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/></svg></button>
          <button onclick="toggleRightPanel()" title="上下文"><svg width="14" height="14" viewBox="0 0 14 14"><rect x="1.5" y="2.5" width="11" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.3"/><line x1="8.5" y1="2.5" x2="8.5" y2="11.5" stroke="currentColor" stroke-width="1.3"/></svg></button>
        </div>
      </header>
      <div id="chat-area" class="chat-area"></div>
      <div class="input-area"></div>
    </main>
    <!-- OnlyOffice Split Panel -->
    <div class="oo-panel" id="oo-panel">
      <div id="doc-studio" class="doc-studio"></div>
    </div>
    <aside class="context-panel" id="context-panel"></aside>
</div>

<!-- Shell slots for non-main components -->
<div id="dashboard" style="display:none"></div>
<div id="settings-modal" class="modal-overlay" style="display:none"></div>
<div id="doc-reader-modal" class="modal-overlay" style="display:none"></div>
<div id="notifications" class="notif-container"></div>
<div id="user-dropdown" class="user-dropdown" style="display:none"></div>
<div id="boot-overlay" class="boot-overlay"></div>
<div id="ctx-menu" class="ctx-menu" style="display:none"></div>

<!-- Share Modal -->
<div class="modal-overlay" id="share-modal" style="display:none" onclick="Share.close()"></div>

<!-- Code Editor Panel -->
<div class="modal-overlay" id="editor-panel" style="display:none" onclick="if(event.target===this)LT.emit('code-editor:toggle')">
  <div class="modal-panel" style="width:95vw;height:90vh;max-width:1200px">
    <div class="modal-header">
      <span class="modal-title">代码编辑器</span>
      <button class="modal-close" onclick="LT.emit('code-editor:toggle')"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
    </div>
    <div class="modal-body" style="padding:0;overflow:hidden" id="editor-panel-body"></div>
  </div>
</div>

<!-- Graph Studio Panel (full-screen overlay) -->
<div class="gs-overlay" id="graph-studio-panel" style="display:none">
  <div id="graph-studio" class="graph-studio"></div>
</div>

<!-- Diagram Studio Panel (report diagrams) -->
<div class="gs-overlay" id="diagram-studio-panel" style="display:none">
  <div id="diagram-studio" class="diagram-studio"></div>
</div>

<!-- Core -->
<script src="core/framework.js"></script>
<!-- Services -->
<script src="services/store.js"></script>
<script src="services/api.js"></script>
<script src="services/renderer.js"></script>
<script src="services/share.js"></script>
<script src="services/onlyoffice.js"></script>
<script src="services/x6-graph.js"></script>
<script src="services/x6-diagram.js"></script>
<script src="services/cards.js"></script>
<!-- Components -->
<script src="components/boot-overlay/boot-overlay.js"></script>
<script src="components/sidebar/sidebar.js"></script>
<script src="components/dashboard/dashboard.js"></script>
<script src="components/chat/chat.js"></script>
<script src="components/input/input.js"></script>
<script src="components/context-panel/context-panel.js"></script>
<script src="components/settings/settings.js"></script>
<script src="components/doc-reader/doc-reader.js"></script>
<script src="components/notifications/notifications.js"></script>
<script src="components/user-menu/user-menu.js"></script>
<script src="components/code-editor/code-editor.js"></script>
<script src="components/doc-studio/doc-studio.js"></script>
<script src="components/graph-studio/graph-studio.js"></script>
<script src="components/diagram-studio/diagram-studio.js"></script>
<!-- Bootstrap -->
<script src="app.js"></script>
</body>
</html>
