<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LivingTree · 数字生命体</title>
<style>
:root {
  --bg: #08080f;--surface: #0f0f18;--border: #1a1a2e;--text: #c8c8d4;
  --dim: #556;--accent: #6c8;--gold: #da0;--red: #e05050;--blue: #4a8;--purple: #84a;--cyan: #0cc;
  --code-bg: #0d1117;--card-bg: #111822;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:14px/1.6 system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

#living-window{flex:1;display:flex;flex-direction:column;max-width:800px;margin:0 auto;width:100%;position:relative}

/* ── Mind Space ── */
#mind-space{flex:1;overflow-y:auto;padding:16px 20px 0;display:flex;flex-direction:column;gap:10px;contain:strict}
#mind-space::-webkit-scrollbar{width:4px}
#mind-space::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Messages ── */
.msg{max-width:88%;padding:10px 14px;border-radius:12px;animation:fadeIn .25s ease}
.msg.user{align-self:flex-end;background:var(--accent);color:var(--bg)}
.msg.lifeform{align-self:flex-start;background:var(--surface);border:1px solid var(--border)}
.msg.system{align-self:center;background:transparent;color:var(--dim);font-size:12px;max-width:100%;text-align:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Rich response cards ── */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:4px}
.card-header{font-size:12px;color:var(--dim);margin-bottom:6px;display:flex;justify-content:space-between}
.card-type{text-transform:uppercase;letter-spacing:1px;font-weight:600}
.card-type.code{color:var(--cyan)}.card-type.list{color:var(--gold)}.card-type.table{color:var(--blue)}.card-type.diag{color:var(--purple)}.card-type.warn{color:var(--red)}.card-type.file{color:var(--accent)}

/* Code */
pre.code-block{background:var(--code-bg);border-radius:8px;padding:12px;overflow-x:auto;font:13px/1.5 'JetBrains Mono',monospace;max-height:300px;position:relative}
pre.code-block .copy-btn{position:absolute;top:6px;right:8px;background:var(--surface);border:1px solid var(--border);color:var(--dim);font-size:11px;padding:2px 8px;border-radius:4px;cursor:pointer;opacity:0;transition:opacity .2s}
pre.code-block:hover .copy-btn{opacity:1}
pre.code-block .lang-tag{position:absolute;top:6px;left:8px;font-size:10px;color:var(--dim);text-transform:uppercase}

/* Table */
table.data-table{border-collapse:collapse;width:100%;font-size:13px}
table.data-table th{background:var(--surface);color:var(--dim);font-weight:600;padding:6px 10px;text-align:left;border-bottom:2px solid var(--border);font-size:11px;text-transform:uppercase}
table.data-table td{padding:5px 10px;border-bottom:1px solid var(--border)}
table.data-table tr:hover{background:rgba(102,204,136,.05)}

/* List */
.clean-list{list-style:none;padding:0}
.clean-list li{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.clean-list li:before{content:'▸ ';color:var(--accent);margin-right:6px}

/* Diagram placeholder */
.diagram-box{background:var(--surface);border:1px dashed var(--border);border-radius:8px;padding:16px;text-align:center;color:var(--dim);font-size:13px;min-height:80px;display:flex;align-items:center;justify-content:center}

/* File attachment */
.file-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;margin:4px}
.file-chip .remove{color:var(--red);cursor:pointer;font-weight:bold;font-size:16px}

/* Collapsible */
.collapse-toggle{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;width:100%;text-align:left;color:var(--dim);cursor:pointer;font-size:13px}
.collapse-toggle:hover{color:var(--accent)}
.collapse-toggle::before{content:'▶ ';display:inline-block;transition:transform .2s;font-size:10px}
.collapse-toggle.open::before{transform:rotate(90deg)}
.collapse-content{display:none;padding:8px 0}
.collapse-content.open{display:block}

/* Thinking banner */
.thinking{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);padding:6px 0;animation:pulse 2s infinite}
.thinking .icon{font-size:16px}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* Aura & Input */
#input-orbit{position:relative;padding:10px 16px 16px;border-top:1px solid var(--border);background:var(--surface)}
#aura-ring{position:absolute;top:-16px;left:50%;transform:translateX(-50%);width:calc(100% + 16px);height:5px;border-radius:0 0 6px 6px;transition:background .4s,box-shadow .4s}
#aura-ring.calm{background:var(--accent);box-shadow:0 0 10px rgba(102,204,136,.25)}
#aura-ring.curious{background:var(--gold)}
#aura-ring.thinking{background:var(--blue)}
#aura-ring.creative{background:var(--purple)}
#aura-ring.stressed{background:var(--red)}

/* Drop zone */
#drop-zone{display:none;position:absolute;inset:0;background:rgba(102,204,136,.08);border:2px dashed var(--accent);border-radius:14px;z-index:5;align-items:center;justify-content:center;font-size:16px;color:var(--accent)}
#drop-zone.show{display:flex}

#input-area{display:flex;align-items:flex-end;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:8px 12px;transition:border-color .3s;position:relative;z-index:10}
#input-area:focus-within{border-color:var(--accent)}
#msg-input{flex:1;background:transparent;border:none;color:var(--text);font-size:15px;resize:none;outline:none;min-height:24px;max-height:120px;font-family:inherit;line-height:1.5}
#msg-input::placeholder{color:var(--dim)}

#action-bar{display:flex;gap:6px;align-items:center}
.btn{background:transparent;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:all .2s}
.btn:hover{color:var(--accent);background:var(--border)}
.btn.active{color:var(--accent)}.btn.recording{animation:recPulse .8s infinite}
@keyframes recPulse{0%,100%{color:var(--red)}50%{color:var(--text)}}

/* Copy & Share buttons */
.msg-actions{display:flex;gap:4px;margin-top:4px;opacity:0;transition:opacity .2s}
.msg:hover .msg-actions{opacity:1}
.msg-actions button{background:var(--surface);border:1px solid var(--border);color:var(--dim);font-size:11px;padding:2px 6px;border-radius:4px;cursor:pointer}
.msg-actions button:hover{color:var(--accent)}
.share-menu{display:none;position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;z-index:20}
.share-menu.show{display:block}

/* Folder path input */
#folder-bar{display:flex;gap:6px;align-items:center;padding:0 0 4px}
#folder-path{flex:1;background:transparent;border:none;color:var(--dim);font-size:11px;outline:none;font-family:monospace}
#folder-path::placeholder{color:var(--dim)}
#folder-result{font-size:11px;color:var(--accent);padding:2px 0;display:none}
#folder-result.show{display:block}

#file-preview{display:flex;flex-wrap:wrap;gap:4px;padding:4px 0}

#heartbeat{font-size:12px;color:var(--dim);text-align:center;padding:4px 0}
#stream-hint{position:absolute;top:-26px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--dim);background:var(--surface);padding:2px 10px;border-radius:10px;display:none;white-space:nowrap}
#stream-hint.show{display:block}
</style>
</head>
<body>

<div id="living-window">
  <div id="mind-space">
    <div class="msg system">🌳 数字生命体已唤醒 · 可直接输入、拖入文件开始对话</div>
  </div>

  <div id="input-orbit">
    <div id="aura-ring" class="calm"></div>
    <div id="stream-hint">⋯ 正在倾听</div>
    <div id="drop-zone">📂 释放文件以上传</div>

    <div id="input-area">
      <textarea id="msg-input" rows="1" placeholder="输入想法，拖入文件，或语音输入..." autofocus></textarea>
      <div id="action-bar">
        <button class="btn" id="btn-file" title="选择文件">📎</button>
        <button class="btn" id="btn-voice" title="语音输入">🎤</button>
        <button class="btn" id="btn-send" title="发送">↑</button>
      </div>
    </div>
    <div id="file-preview"></div>
    <div id="folder-bar">
      <button class="btn" id="btn-folder" style="font-size:12px;padding:4px 10px;display:flex;align-items:center;gap:4px">
        📂 <span id="folder-label">选择本地项目文件夹</span>
      </button>
      <span id="folder-path-display" style="color:var(--accent);font-size:11px;font-family:monospace;display:none"></span>
      <button class="btn" id="btn-scan" style="font-size:12px;padding:2px 8px;display:none">分析</button>
    </div>
    <div id="folder-result"></div>
    <div id="heartbeat">💓 <b id="bpm">62</b> BPM · <span id="aura-label">平静</span></div>
  </div>
</div>

<input type="file" id="file-input" multiple hidden>
<input type="file" id="folder-input" webkitdirectory hidden>

<script>
// ═══════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════
const mind = document.getElementById('mind-space');
const input = document.getElementById('msg-input');
const aura = document.getElementById('aura-ring');
const bpmEl = document.getElementById('bpm');
const auraLabel = document.getElementById('aura-label');
const streamHint = document.getElementById('stream-hint');
const dropZone = document.getElementById('drop-zone');
const filePreview = document.getElementById('file-preview');
const fileInput = document.getElementById('file-input');
const folderInput = document.getElementById('folder-input');

let bpm = 62, emotion = 'calm', thoughtCount = 0, silenceTimer = null;
let attachedFiles = [];

// ═══════════════════════════════════════════════════════
// Heartbeat
// ═══════════════════════════════════════════════════════
function setHeart(b, e) {
  bpm = Math.round(b); emotion = e;
  bpmEl.textContent = bpm;
  const labels = {calm:'平静',curious:'好奇',thinking:'思考中',creative:'创造中',stressed:'紧张'};
  auraLabel.textContent = labels[e]||e;
  aura.className = e;
  if(bpm>100) bpmEl.style.color='var(--red)';
  else if(bpm>80) bpmEl.style.color='var(--gold)';
  else bpmEl.style.color='var(--accent)';
}
setInterval(()=>setHeart(bpm+(Math.random()-.5)*4,emotion),1500);

// ═══════════════════════════════════════════════════════
// Message rendering
// ═══════════════════════════════════════════════════════
function addMsg(text, type='lifeform') {
  const el = document.createElement('div');
  el.className = `msg ${type}`;
  el.innerHTML = text;
  mind.appendChild(el);
  mind.scrollTop = mind.scrollHeight;
}

function addSystem(text) { addMsg(text, 'system'); }

function addThinking(icon, text) {
  const old = mind.querySelector('.thinking');
  if(old) old.remove();
  const el = document.createElement('div');
  el.className = 'thinking';
  el.innerHTML = `<span class="icon">${icon}</span> ${text}`;
  mind.appendChild(el);
  mind.scrollTop = mind.scrollHeight;
}

// ═══════════════════════════════════════════════════════
// Rich response cards
// ═══════════════════════════════════════════════════════
function addCard(type, title, content, extra={}) {
  const el = document.createElement('div');
  el.className = 'msg lifeform';

  let body = '';
  switch(type) {
    case 'code':
      const lang = extra.lang || '';
      body = `<div class="card"><div class="card-header"><span class="card-type code">📄 ${title||'Code'}</span><span>${lang}</span></div>
              <pre class="code-block"><span class="lang-tag">${lang}</span><button class="copy-btn" onclick="copyCode(this)">复制</button><code>${escapeHtml(content)}</code></pre></div>`;
      break;
    case 'list':
      const items = Array.isArray(content) ? content : content.split('\n').filter(Boolean);
      body = `<div class="card"><div class="card-header"><span class="card-type list">📋 ${title||'列表'}</span></div>
              <ul class="clean-list">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
      break;
    case 'table':
      body = `<div class="card"><div class="card-header"><span class="card-type table">📊 ${title||'表格'}</span></div>${content}</div>`;
      break;
    case 'warn':
      body = `<div class="card"><div class="card-header"><span class="card-type warn">⚠ ${title||'警告'}</span></div><p>${content}</p></div>`;
      break;
    case 'diagram':
      body = `<div class="card"><div class="card-header"><span class="card-type diag">📐 ${title||'图表'}</span></div><div class="diagram-box">${content||'图表渲染区域'}</div></div>`;
      break;
    case 'file':
      body = `<div class="card"><div class="card-header"><span class="card-type file">📁 ${title||'文件'}</span></div><p>${content}</p></div>`;
      break;
    default:
      body = content;
  }
  el.innerHTML = body;
  mind.appendChild(el);
  mind.scrollTop = mind.scrollHeight;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function copyCode(btn) {
  const code = btn.parentElement.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent='已复制!';setTimeout(()=>btn.textContent='复制',1500);
  });
}

// ═══════════════════════════════════════════════════════
// File handling
// ═══════════════════════════════════════════════════════
function handleFiles(files) {
  for(const f of files) {
    if(attachedFiles.find(x=>x.name===f.name)) continue;
    attachedFiles.push(f);
    const chip = document.createElement('span');
    chip.className = 'file-chip';
    chip.innerHTML = `${f.name} <span class="remove" data-name="${f.name}">×</span>`;
    filePreview.appendChild(chip);
  }
  updateFileHint();
}

function removeFile(name) {
  attachedFiles = attachedFiles.filter(f=>f.name!==name);
  filePreview.querySelectorAll('.file-chip').forEach(c=>{if(c.querySelector('.remove').dataset.name===name)c.remove()});
  updateFileHint();
}

function updateFileHint() {
  if(attachedFiles.length) {
    input.placeholder = `已附加 ${attachedFiles.length} 个文件。输入你的问题...`;
  } else {
    input.placeholder = '输入想法，拖入文件，或语音输入...';
  }
}

filePreview.addEventListener('click', e=>{
  if(e.target.classList.contains('remove')) removeFile(e.target.dataset.name);
});

btnFile.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',()=>handleFiles(fileInput.files));

// Drag & drop
document.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('show')});
document.addEventListener('dragleave',e=>{if(!e.relatedTarget||e.relatedTarget===document.documentElement)dropZone.classList.remove('show')});
document.addEventListener('drop',e=>{
  e.preventDefault();dropZone.classList.remove('show');
  const items = e.dataTransfer.items;
  if(items) {
    const entries = [];
    for(const item of items) {
      if(item.kind==='file') entries.push(item.webkitGetAsEntry?item.webkitGetAsEntry():item.getAsFile());
    }
    processEntries(entries);
  }
});

async function processEntries(entries) {
  const files = [];
  for(const entry of entries) {
    if(entry.isFile) {
      files.push(await getFile(entry));
    } else if(entry.isDirectory) {
      const subFiles = await readDir(entry);
      files.push(...subFiles);
    }
  }
  handleFiles(files);
}

function getFile(entry) {
  return new Promise(resolve=>entry.file(resolve));
}

async function readDir(dirEntry) {
  const files = [];
  const reader = dirEntry.createReader();
  const entries = await new Promise(resolve=>reader.readEntries(resolve));
  for(const entry of entries) {
    if(entry.isFile) files.push(await getFile(entry));
    else if(entry.isDirectory) files.push(...await readDir(entry));
  }
  return files;
}

// ═══════════════════════════════════════════════════════
// Voice input
// ═══════════════════════════════════════════════════════
let isRecording = false;
const btnVoice = document.getElementById('btn-voice');

btnVoice.addEventListener('click',async()=>{
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return addSystem('🎤 语音需要Chrome浏览器');
  if(isRecording){isRecording=false;btnVoice.classList.remove('active','recording');return}
  const rec = new SR();rec.lang='zh-CN';rec.interimResults=true;rec.continuous=true;
  rec.onstart=()=>{isRecording=true;btnVoice.classList.add('active','recording');addSystem('🎤 聆听中...')};
  rec.onresult=e=>{let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;input.value=t};
  rec.onerror=e=>{isRecording=false;btnVoice.classList.remove('active','recording')};
  rec.onend=()=>{isRecording=false;btnVoice.classList.remove('active','recording')};
  rec.start();
});

// ═══════════════════════════════════════════════════════
// Send message
// ═══════════════════════════════════════════════════════
const thinkStages = [
  {d:200,i:'💓',t:'听到了...',b:72,e:'curious'},
  {d:400,i:'🌈',t:'理解意图中...',b:78,e:'thinking'},
  {d:600,i:'🧠',t:'调动知识层...',b:85,e:'thinking'},
  {d:800,i:'💭',t:'推理中...',b:90,e:'creative'},
  {d:1000,i:'📝',t:'组织回复...',b:75,e:'calm'},
];

async function sendMessage() {
  const text = input.value.trim();
  if(!text && !attachedFiles.length) return;

  // User message
  let userMsg = text;
  if(attachedFiles.length) {
    userMsg += `\n📎 附件: ${attachedFiles.map(f=>f.name).join(', ')}`;
  }
  addMsg(userMsg, 'user');
  thoughtCount++;

  // Show stream hint
  streamHint.classList.add('show');
  streamHint.textContent = `⋯ 已接收 ${thoughtCount} 条`;

  input.value = '';
  input.style.height = 'auto';

  // Check if user wants response
  const wantsResponse = /[？?]|你觉得|帮我|怎么样|分析|代码|文档/.test(text) || attachedFiles.length > 0;

  if(wantsResponse || thoughtCount >= 2) {
    streamHint.classList.remove('show');
    thoughtCount = 0;

    // Progressive thinking
    for(const s of thinkStages) {
      await new Promise(r=>setTimeout(r,s.d));
      addThinking(s.i, s.t);
      setHeart(s.b, s.e);
    }

    // Remove thinking
    const t = mind.querySelector('.thinking');
    if(t) t.remove();

    // Generate rich response based on content type
    const resp = generateResponse(text, attachedFiles);
    for(const card of resp) {
      addCard(card.type, card.title, card.content, card.extra||{});
    }

    // Clear files after processing
    attachedFiles = [];
    filePreview.innerHTML = '';
    updateFileHint();
    setHeart(62, 'calm');
  } else {
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(async () => {
      if(thoughtCount > 0) {
        streamHint.classList.remove('show');
        thoughtCount = 0;
        for(const s of thinkStages) {
          await new Promise(r=>setTimeout(r,s.d));
          addThinking(s.i, s.t);setHeart(s.b, s.e);
        }
        const t = mind.querySelector('.thinking');if(t) t.remove();
        const resp = generateResponse(text, attachedFiles);
        for(const card of resp) addCard(card.type, card.title, card.content, card.extra||{});
        attachedFiles = [];filePreview.innerHTML = '';updateFileHint();
        setHeart(62, 'calm');
      }
    }, 3000);
  }
}

function generateResponse(text, files) {
  const cards = [];
  const t = text.toLowerCase();

  // File analysis
  if(files.length) {
    cards.push({type:'file',title:'文件分析',content:`分析了 ${files.length} 个文件：${files.map(f=>f.name).join('、')}`});
    if(files.some(f=>f.name.endsWith('.py')||f.name.endsWith('.js')||f.name.endsWith('.ts'))) {
      cards.push({type:'code',title:'代码结构预览',content:'# 正在分析代码结构...\ndef analyze_code():\n    pass',extra:{lang:'python'}});
    }
  }

  // Code request
  if(/代码|code|函数|function|class|实现/.test(t)) {
    cards.push({type:'code',title:'代码方案',content:'def solution():\n    """基于你的需求生成的代码"""\n    pass',extra:{lang:'python'}});
  }

  // List request
  if(/列表|推荐|哪些|几个/.test(t)) {
    cards.push({type:'list',title:'推荐列表',content:['选项一：基于当前上下文分析','选项二：考虑性能和成本','选项三：未来可扩展性']});
  }

  // Warning
  if(/错误|bug|error|fix|修复/.test(t)) {
    cards.push({type:'warn',title:'需要注意',content:'检测到潜在问题。建议先进行代码审查，确保没有副作用。'});
  }

  // Architecture
  if(/架构|设计|结构|architecture/.test(t)) {
    cards.push({type:'diagram',title:'架构图','📐 架构图将在完整环境中渲染'});
  }

  // Default: smart text response
  if(!cards.length) {
    cards.push({type:'text',title:'',content:'我理解你的问题。基于当前知识库和上下文，我的分析是：这是一个需要多维度考虑的问题。建议从以下几个方面入手...'});
  }

  return cards;
}

// ═══════════════════════════════════════════════════════
// Events
// ═══════════════════════════════════════════════════════
document.getElementById('btn-send').addEventListener('click',sendMessage);
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px'});

// Init
const h = new Date().getHours();
addSystem(`🌳 数字生命体已唤醒 · ${h<6?'深夜':h<12?'早上':h<18?'下午':'晚上'}好 · 可直接输入、拖入文件、或输入本地文件夹路径`);
setHeart(62,'calm');
input.focus();

// ═══════════════════════════════════════════════════════
// Copy individual message
// ═══════════════════════════════════════════════════════
mind.addEventListener('click', e => {
  if(e.target.classList.contains('copy-msg-btn')) {
    const msgEl = e.target.closest('.msg');
    const text = msgEl.textContent.replace(/复制|分享|语音/g,'').trim();
    navigator.clipboard.writeText(text);
    e.target.textContent='已复制';setTimeout(()=>e.target.textContent='复制',1500);
  }
  if(e.target.classList.contains('share-msg-btn')) {
    const msgEl = e.target.closest('.msg');
    const text = msgEl.textContent.trim();
    if(navigator.share){navigator.share({text:text})}else{
      navigator.clipboard.writeText(text);
      addSystem('📋 已复制到剪贴板（浏览器不支持原生分享）');
    }
  }
});

// Add copy/share buttons to all lifeform messages after they appear
const msgObserver = new MutationObserver(mutations => {
  for(const m of mutations) {
    for(const node of m.addedNodes) {
      if(node.classList && node.classList.contains('lifeform') && !node.querySelector('.msg-actions')) {
        const actions = document.createElement('div');
        actions.className = 'msg-actions';
        actions.innerHTML = '<button class="copy-msg-btn">复制</button><button class="share-msg-btn">分享</button>';
        node.appendChild(actions);
      }
    }
  }
});
msgObserver.observe(mind, {childList:true, subtree:true});

// ═══════════════════════════════════════════════════════
// Copy entire conversation
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if(e.ctrlKey && e.key==='c' && document.activeElement===document.body) {
    const allMsgs = mind.querySelectorAll('.msg:not(.system)');
    const text = Array.from(allMsgs).map(m=>{
      const role = m.classList.contains('user')?'用户':'🌳';
      return `${role}: ${m.textContent.trim()}`;
    }).join('\n\n');
    if(text) {
      navigator.clipboard.writeText(text);
      addSystem('📋 全部对话已复制 (' + allMsgs.length + ' 条消息)');
    }
  }
});

// ═══════════════════════════════════════════════════════
// Local folder selection (Native File System API)
// ═══════════════════════════════════════════════════════
const btnFolder = document.getElementById('btn-folder');
const folderLabel = document.getElementById('folder-label');
const folderPathDisplay = document.getElementById('folder-path-display');
const btnScan = document.getElementById('btn-scan');
const folderResult = document.getElementById('folder-result');
let selectedFolderPath = '';
let selectedFolderHandle = null;

btnFolder.addEventListener('click', async () => {
  try {
    // Try Native File System API first
    if('showDirectoryPicker' in window) {
      const handle = await window.showDirectoryPicker();
      selectedFolderHandle = handle;
      selectedFolderPath = handle.name;
    } else {
      // Fallback: use webkitdirectory input
      const input = document.createElement('input');
      input.type = 'file';
      input.webkitdirectory = true;
      input.onchange = () => {
        if(input.files.length > 0) {
          selectedFolderPath = input.files[0].webkitRelativePath.split('/')[0];
          showFolderSelected();
        }
      };
      input.click();
      return;
    }
  } catch(e) {
    // User cancelled or not supported → fallback to manual input
    const path = prompt('请输入本地项目文件夹的完整路径 (如 D:\\myproject)：');
    if(path) { selectedFolderPath = path; showFolderSelected(); }
    return;
  }
  if(selectedFolderPath) showFolderSelected();
});

function showFolderSelected() {
  folderLabel.textContent = '已选择';
  folderPathDisplay.textContent = selectedFolderPath;
  folderPathDisplay.style.display = 'inline';
  btnScan.style.display = 'inline';
}

async function scanFolder() {
  if(!selectedFolderPath) return;
  folderResult.classList.remove('show');
  addSystem('📂 正在分析: ' + selectedFolderPath);
  setHeart(75, 'thinking');
  try {
    // Send full path to server for local analysis
    const payload = selectedFolderHandle
      ? { path: selectedFolderPath, mode: 'handle' }
      : { path: selectedFolderPath };
    const res = await fetch('/api/local/analyze', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    const data = await res.json();
    if(res.ok) {
      folderResult.textContent = `✅ ${data.file_count} 个文件 · ${data.total_size_mb} MB`;
      folderResult.classList.add('show');
      addCard('file', `📂 ${selectedFolderPath}`,
        `共 ${data.file_count} 个文件 (${data.total_size_mb} MB)。主要类型: ${Object.entries(data.extensions||{}).slice(0,5).map(([k,v])=>`${k}(${v})`).join(', ')}。`);
      addMsg('需要我分析哪些方面？代码结构、依赖关系、还是生成文档？', 'lifeform');

      // Save path for file operations
      window._projectPath = selectedFolderPath;
    } else {
      folderResult.textContent = `❌ ${data.detail||'无法访问。请确认路径正确且服务器有读取权限。'}`;
      folderResult.classList.add('show');
    }
  } catch(e) {
    folderResult.textContent = '❌ 服务器不可达';
    folderResult.classList.add('show');
  }
  setHeart(62, 'calm');
}

btnScan.addEventListener('click', scanFolder);

// ═══════════════════════════════════════════════════════
// WeChat / WeCom Share (QR code fallback)
// ═══════════════════════════════════════════════════════
function shareToWechat(text) {
  const url = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(text)}`;
  const card = document.createElement('div');
  card.className = 'msg lifeform';
  card.innerHTML = `<div class="card"><div class="card-header"><span class="card-type diag">📱 分享</span></div>
    <p style="font-size:12px;color:var(--dim);margin-bottom:8px">扫描二维码分享到微信</p>
    <img src="${url}" alt="QR Code" style="width:160px;height:160px;border-radius:8px;background:white;padding:4px">
    <p style="font-size:11px;color:var(--dim);margin-top:4px">或复制文本手动粘贴</p></div>`;
  mind.appendChild(card);
  mind.scrollTop = mind.scrollHeight;
}

// Update share button to support WeChat
mind.addEventListener('click', e => {
  if(e.target.classList.contains('share-msg-btn')) {
    const msgEl = e.target.closest('.msg');
    const text = msgEl.textContent.replace(/复制|分享|语音/g,'').trim();

    // Try WeChat URL scheme first
    const wechatUrl = `weixin://dl/moments?text=${encodeURIComponent(text)}`;
    const tryWechat = window.open(wechatUrl, '_blank');

    // If WeChat didn't open (blocked or not installed), show QR
    setTimeout(() => {
      if(tryWechat && !tryWechat.closed) return;
      shareToWechat(text);
    }, 500);
  }
});

// ═══════════════════════════════════════════════════════
// Local file operations (via server — browser can't directly)
// ═══════════════════════════════════════════════════════
// File operations: read/write/execute all go through the server
// The server has local filesystem access. Browser sends commands.
async function localFileOp(op, filePath, content) {
  if(!window._projectPath && !filePath.startsWith('/') && !filePath.match(/^[A-Z]:/)) {
    addSystem('⚠ 请先选择本地项目文件夹');
    return null;
  }
  const fullPath = window._projectPath ? `${window._projectPath}/${filePath}` : filePath;
  try {
    const res = await fetch('/api/local/file', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({op, path:fullPath, content})
    });
    return await res.json();
  } catch(e) { return null; }
}

// Hook into send to handle file operation commands
const origSend = sendMessage;
sendMessage = async function() {
  const text = input.value.trim();

  // Detect file operation commands
  if(/^read\s+/i.test(text)) {
    const filePath = text.replace(/^read\s+/i,'').trim();
    const result = await localFileOp('read', filePath);
    if(result) addCard('code', filePath.split('/').pop(), result.content||result.error, {lang:'auto'});
    input.value = '';return;
  }
  if(/^write\s+(\S+)\s*\n/i.test(text)) {
    const match = text.match(/^write\s+(\S+)\s*\n([\s\S]*)/i);
    if(match) {
      const result = await localFileOp('write', match[1], match[2]);
      if(result) addSystem(result.ok ? `✅ 已写入 ${match[1]}` : `❌ ${result.error}`);
    }
    input.value = '';return;
  }
  if(/^(run|exec|sh|bash)\s+/i.test(text)) {
    const cmd = text.replace(/^(run|exec|sh|bash)\s+/i,'').trim();
    const result = await localFileOp('exec', '', cmd);
    if(result) addCard('code', 'Terminal', result.output||result.error, {lang:'bash'});
    input.value = '';return;
  }

  return origSend();
};
