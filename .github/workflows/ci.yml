name: LivingTreeAI CI/CD

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========== 代码质量检查 ==========
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install pylint flake8 mypy
          pip install -e client/ -e server/relay_server/ || pip install -r requirements.txt || true

      - name: 运行 pylint
        run: |
          pylint core/ client/ --disable=C0114,C0116,W0718,E0401 || true

      - name: 运行 flake8
        run: |
          flake8 core/ client/ --max-line-length=120 --ignore=E501,W503 || true

      - name: 运行 mypy（类型检查）
        run: |
          mypy core/ client/ --ignore-missing-imports || true

  # ========== 单元测试 ==========
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -e client/ -e server/relay_server/ || pip install -r requirements.txt || true

      - name: 运行测试
        run: |
          pytest tests/ -v --cov=core --cov=client/src --cov-report=xml --cov-report=html || true

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  # ========== 构建 Docker 镜像 ==========
  build:
    name: 构建 Docker 镜像
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU（多平台构建）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录容器注册表
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建并推送
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ========== 性能基准测试 ==========
  benchmark:
    name: 性能基准测试
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install pytest pytest-benchmark
          pip install -e client/ || true

      - name: 运行性能测试
        run: |
          pytest tests/ -v --benchmark-enable --benchmark-autosave --benchmark-save-data=benchmark.json || true

      - name: 上传性能数据
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .benchmarks/
        continue-on-error: true

  # ========== 自动部署（master 分支） ==========
  deploy:
    name: 自动部署
    runs-on: ubuntu-latest
    needs: [build, benchmark]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署到生产环境
        run: |
          echo "部署到生产环境..."
          # 这里添加实际的部署脚本
          # 例如：kubectl apply -f deploy/k8s/
        continue-on-error: true

      - name: 通知部署完成
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: '部署完成：{{ github.sha }}'
        continue-on-error: true
