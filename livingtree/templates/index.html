{% extends "base.html" %}
{% block content %}
<div class="grid2">
  <div class="card">
    <h2>🌳 关于小树</h2>
    <div class="metric"><span>名字</span><span>生命之树 (小树)</span></div>
    <div class="metric"><span>状态</span><span><span class="status-dot green"></span>运行中</span></div>
    <div class="metric"><span>性质</span><span>主动学习 · 自主生长 · 不需要"你好"</span></div>
  </div>
  <div class="card">
    <h2>⚡ 快速对话</h2>
    <form hx-post="/tree/chat/msg" hx-target="#quick-result" hx-swap="innerHTML">
      <textarea name="message" rows="3" placeholder="直接告诉小树你想做什么..."></textarea>
      <button type="submit" style="margin-top:8px">发送</button>
    </form>
    <div id="quick-result" style="margin-top:12px"></div>
  </div>
</div>
<div class="card" style="margin-top:16px">
  <h2>📋 最近系统事件</h2>
  <div hx-get="/tree/health" hx-trigger="load, every 30s" hx-swap="innerHTML">
    <div class="panel">加载中...</div>
  </div>
</div>
{% endblock %}
