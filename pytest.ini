[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记
markers =
    unit: 单元测试（纯逻辑，无外部依赖）
    integration: 集成测试（需要数据库/本地资源）
    slow: 慢速测试（需要网络/外部API）
    ui: UI组件测试

# 输出设置
addopts = -v --tb=short --strict-markers

# 超时（需安装 pytest-timeout，如遇兼容性问题可注释掉）
# timeout = 60

# 异步支持
asyncio_mode = auto

# 过滤warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
