<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LivingTree AI Agent</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#16213e">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 2rem;
        }
        .api-endpoints {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .endpoint {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .endpoint:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        .endpoint h3 {
            color: #00d2ff;
            margin-bottom: 0.5rem;
        }
        .endpoint code {
            color: #a0a0a0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 LivingTree AI Agent</h1>
        <p>智能代理开发平台 - Web API Gateway</p>
        <div class="api-endpoints">
            <div class="endpoint">
                <h3>🏥 健康检查</h3>
                <code>GET /api/health</code>
            </div>
            <div class="endpoint">
                <h3>💬 聊天对话</h3>
                <code>POST /api/v1/chat/completions</code>
            </div>
            <div class="endpoint">
                <h3>🧠 记忆搜索</h3>
                <code>GET /api/v1/memory/search</code>
            </div>
            <div class="endpoint">
                <h3>🎯 技能列表</h3>
                <code>GET /api/v1/skills/list</code>
            </div>
            <div class="endpoint">
                <h3>📤 文件上传</h3>
                <code>POST /api/v1/upload</code>
            </div>
            <div class="endpoint">
                <h3>🔌 WebSocket</h3>
                <code>WS /ws/v1/chat</code>
            </div>
        </div>
    </div>
    <script>
        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker 注册成功'))
                .catch(err => console.error('Service Worker 注册失败', err));
        }
    </script>
</body>
</html>
