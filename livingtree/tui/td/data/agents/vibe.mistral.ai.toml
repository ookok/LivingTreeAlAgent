# Schema defined in agent_schema.py
# https://www.claude.com/product/claude-code

identity = "vibe.mistral.ai"
name = "Mistral Vibe"
short_name = "vibe"
url = "https://mistral.ai/news/devstral-2-vibe-cli"
protocol = "acp"
author_name = "Mistral"
author_url = "https://mistral.ai/"
publisher_name = "Will McGugan"
publisher_url = "https://willmcgugan.github.io/"
type = "coding"
description = "State-of-the-art, open-source agentic coding models and CLI agent."
tags = []
run_command."*" = "vibe-acp"
recommended = true

help = '''
# Mistral's open-source CLI coding assistant.

Mistral Vibe is a command-line coding assistant powered by Mistral's models.

Vibe provides a conversational interface to your codebase, allowing you to use natural language to explore, modify, and interact with your projects through a powerful set of tools.
'''


[actions."*".install]
command = "curl -LsSf https://mistral.ai/vibe/install.sh | bash"
description = "Install Mistral Vibe"
