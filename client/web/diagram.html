<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>图表编辑器 — LivingTree</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@antv/x6@2.18.1/dist/x6.min.js"></script>
</head>
<body class="h-full bg-gray-50 flex flex-col">
<header class="flex items-center justify-between px-4 py-2 bg-white border-b border-gray-200 flex-shrink-0">
  <h1 class="text-sm font-semibold text-gray-700">📊 报告图表编辑器</h1>
  <div class="flex gap-2">
    <button onclick="addNode()" class="px-3 py-1.5 text-xs bg-blue-600 text-white rounded-lg hover:bg-blue-700">+ 节点</button>
    <button onclick="exportJSON()" class="px-3 py-1.5 text-xs bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200">导出</button>
  </div>
</header>
<div id="canvas" class="flex-1"></div>

<script>
let graph;
function init() {
  graph = new X6.Graph({
    container: document.getElementById('canvas'),
    width: document.getElementById('canvas').offsetWidth,
    height: document.getElementById('canvas').offsetHeight,
    grid: { size: 10, visible: true },
    connecting: { router: 'manhattan', connector: 'rounded' },
  });
}
function addNode() {
  graph.addNode({ x: 100+Math.random()*400, y: 100+Math.random()*300, width: 100, height: 40,
    label: 'Node '+(graph.getNodes().length+1), attrs: { body: { fill: '#eff6ff', stroke: '#3b82f6', rx: 8, ry: 8 } } });
}
function exportJSON() { alert(JSON.stringify(graph.toJSON(), null, 2)); }
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
