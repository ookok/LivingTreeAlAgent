name: LivingTreeAI CI/CD

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

env:
  REGISTRY:  ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========== 代码质量检查 ==========
  lint:
    name: 代码质量检查（${{ matrix.os }} / Python ${{ matrix.python-version }}）
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11']

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 mypy
          pip install PyQt6           # UI 组件依赖
          pip install loguru requests
        continue-on-error: true

      - name: 语法检查（Python 编译）
        run: |
          echo "=== 语法检查 client/src/ ==="
          python -m py_compile client/src/business/tools/text_correction_tool.py || true
          python -m py_compile client/src/presentation/components/spell_check_edit.py || true
          python -m py_compile client/src/business/tools/tool_self_repairer.py || true
          python -m py_compile client/src/business/tool_chain_orchestrator.py || true
          echo "=== 语法检查完成 ==="
        continue-on-error: true

      - name: 运行 pylint
        run: |
          pylint client/src/ --disable=C0114,C0116,W0718,E0401,R0801 --max-line-length=120 || true
        continue-on-error: true

      - name: 运行 flake8
        run: |
          flake8 client/src/ --max-line-length=120 --ignore=E501,W503,R0801 || true
        continue-on-error: true

  # ========== 单元测试 ==========
  test:
    name: 单元测试（${{ matrix.os }} / Python ${{ matrix.python-version }}）
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11']

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-qt
          pip install PyQt6 PyQt6-Qt6
          pip install -e client/ || true
          pip install -r requirements.txt || true
        continue-on-error: true

      - name: 运行单元测试
        run: |
          pytest tests/ -v --cov=client/src --cov-report=xml --cov-report=term || true
        env:
          PYTEST_QT_API: pyqt6

      - name: 上传覆盖率报告
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  # ========== 错别字纠正工具专项测试 ==========
  text-correction-test:
    name: 错别字纠正工具测试
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install loguru
          pip install -e client/ || true

      - name: 测试 TextCorrectionTool 语法
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'client/src')
          from business.tools.text_correction_tool import TextCorrectionTool
          print('✅ TextCorrectionTool 导入成功')
          tool = TextCorrectionTool()
          print(f'✅ 工具名称: {tool.name}')
          print(f'✅ 工具描述: {tool.description}')
          print('✅ 所有检查通过')
          "

      - name: 测试错别字类型常量
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'client/src')
          from business.tools.text_correction_tool import (
              ERROR_TYPE_TONE, ERROR_TYPE_SHAPE, ERROR_TYPE_GRAMMAR,
              ERROR_TYPE_EXTRA, ERROR_TYPE_MISSING, ERROR_TYPE_SHUFFLE
          )
          print('✅ 六类错别字常量定义完整：')
          print(f'   1. {ERROR_TYPE_TONE}')
          print(f'   2. {ERROR_TYPE_SHAPE}')
          print(f'   3. {ERROR_TYPE_GRAMMAR}')
          print(f'   4. {ERROR_TYPE_EXTRA}')
          print(f'   5. {ERROR_TYPE_MISSING}')
          print(f'   6. {ERROR_TYPE_SHUFFLE}')
          "

  # ========== 构建 Docker 镜像 ==========
  build:
    name: 构建 Docker 镜像
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU（多平台构建）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录容器注册表
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ========== 性能基准测试 ==========
  benchmark:
    name: 性能基准测试
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-benchmark
          pip install -e client/ || true

      - name: 运行性能测试
        run: |
          pytest tests/ -v --benchmark-enable --benchmark-autosave --benchmark-save-data=benchmark.json || true
        continue-on-error: true

      - name: 上传性能数据
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .benchmarks/
        continue-on-error: true

  # ========== 自动部署（master 分支） ==========
  deploy:
    name: 自动部署
    runs-on: ubuntu-latest
    needs: [build, benchmark]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署到生产环境
        run: |
          echo "=== 开始部署 ==="
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          # 示例：kubectl apply -f deploy/k8s/
          # 示例：scp -r . user@server:/app/
          echo "=== 部署完成 ==="
        continue-on-error: true

      - name: 通知部署完成（Slack）
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          text: "部署完成：{{ github.sha }}"
        continue-on-error: true

      - name: 通知部署完成（企业微信）
        run: |
          curl -X POST "${{ secrets.WECOM_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{
              "msgtype": "text",
              "text": {
                "content": "LivingTreeAI 部署完成\nCommit: ${{ github.sha }}\n状态: ${{ job.status }}"
              }
            }' || true
        continue-on-error: true
