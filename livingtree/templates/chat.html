{% extends "base.html" %}
{% block content %}
<div class="card" x-data="{ sending: false, message: '' }">
  <h2>💬 与小树对话</h2>
  <div id="chat-log">
    <div class="msg assistant">
      <div class="who">小树 🌳</div>
      <div class="text">你好，我是生命之树。你可以叫我小树。我能帮你做什么？</div>
    </div>
  </div>
  <form hx-post="/tree/chat/msg" hx-target="#chat-log" hx-swap="beforeend"
        @submit="sending = true" 
        hx-on::after-request="message = ''; sending = false">
    <textarea name="message" rows="3" placeholder="告诉小树你想做什么..." 
              x-model="message"
              @keydown.ctrl.enter="$el.form.requestSubmit()"></textarea>
    <div style="display:flex;align-items:center;margin-top:8px;gap:8px">
      <button type="submit" :disabled="sending || !message.trim()"
              :class="sending ? 'sending' : ''">
        <span x-show="!sending">发送</span>
        <span x-show="sending">小树思考中...</span>
      </button>
      <span style="font-size:11px;color:var(--dim)" x-text="message.length + '/4000'"></span>
    </div>
  </form>
</div>

<style>
button.sending { opacity: 0.5; cursor: wait; }
.good { color: #6c8; } .warn { color: #e8a030; }
</style>
{% endblock %}
