[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "livingtree-ai-agent"
version = "2.0.0"
description = "LivingTree AI Agent - 智能代理开发平台"
requires-python = ">=3.14"

[tool.setuptools.packages.find]
include = ["livingtree*", "client*", "server*", "app*"]

[project.scripts]
livingtree = "livingtree.main:main"
