<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小树 · 管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<style>
:root{--pico-background-color:#0a0a0f;--pico-color:#c8c8d4;--pico-primary:#6c8;--pico-primary-hover:#5a7;--pico-form-element-background-color:#12121a;--pico-form-element-border-color:#1e1e2e}
body{padding:2rem;max-width:600px;margin:0 auto}
h1{color:var(--pico-primary)}h2{font-size:1rem;margin:2rem 0 .5rem;color:var(--pico-primary)}
.toast{position:fixed;top:1rem;right:1rem;background:var(--pico-primary);color:var(--pico-background-color);padding:.5rem 1rem;border-radius:8px;font-size:.9rem;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<h1>🌳 管理控制台</h1>

<!-- 1. API Keys -->
<h2>🔑 API 密钥</h2>
<form id="form-key">
  <label>Provider
    <select id="provider-select">
      <option value="deepseek">DeepSeek</option>
      <option value="modelscope">ModelScope</option>
      <option value="bailing">Bailing (百灵)</option>
      <option value="stepfun">StepFun (阶跃星辰)</option>
      <option value="internlm">InternLM (书生)</option>
      <option value="openrouter">OpenRouter</option>
      <option value="nvidia">NVIDIA</option>
      <option value="longcat">LongCat</option>
      <option value="sensetime">SenseTime (商汤)</option>
      <option value="siliconflow">SiliconFlow</option>
      <option value="zhipu">Zhipu (智谱)</option>
      <option value="spark">Spark (讯飞星火)</option>
    </select>
  </label>
  <label>API Key <input id="key-input" type="password" placeholder="输入密钥" autocomplete="off"></label>
  <button type="submit">💾 保存</button>
</form>

<h2>🌐 服务地址</h2>
<label>Ollama <input id="ollama-url" placeholder="http://localhost:11434"></label>
<label>OnlyOffice <input id="onlyoffice-url" placeholder="http://localhost:8088"></label>
<button id="btn-save-urls">💾 保存</button>

<h2>💾 导入/导出</h2>
<div style="display:flex;gap:1rem">
  <button id="btn-export">📤 导出配置 (加密)</button>
  <label style="cursor:pointer;padding:.5rem 1rem;background:var(--pico-form-element-background-color);border:1px solid var(--pico-form-element-border-color);border-radius:6px;font-size:.9rem">
    📥 导入配置 <input type="file" id="file-import" accept=".enc" hidden>
  </label>
</div>

<h2>🗑️ 缓存</h2>
<button id="btn-flush">清空响应缓存</button>

<h2>🌐 Scinet 网络加速</h2>
<div id="scinet-panel" style="background:var(--pico-form-element-background-color);border:1px solid var(--pico-form-element-border-color);border-radius:8px;padding:1rem">
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:.8rem">
    <span style="font-weight:bold">状态:</span>
    <span id="scinet-status" style="padding:2px 12px;border-radius:12px;font-size:.85rem">检查中…</span>
  </div>
  <div id="scinet-details" style="font-size:.85rem;color:var(--pico-muted-color);line-height:1.6"></div>
  <div style="display:flex;gap:.5rem;margin-top:.8rem">
    <button id="btn-scinet-start" style="font-size:.8rem;padding:.3rem .8rem">▶ 启动</button>
    <button id="btn-scinet-stop" style="font-size:.8rem;padding:.3rem .8rem">⏹ 停止</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Save API key
document.getElementById('form-key').addEventListener('submit', async e => {
  e.preventDefault();
  const provider = document.getElementById('provider-select').value;
  const key = document.getElementById('key-input').value;
  if(!key) return toast('请输入密钥');
  try {
    const res = await fetch('/api/admin/config', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({provider, key}),
    });
    if(res.ok) { toast('✅ 已保存'); document.getElementById('key-input').value = ''; }
    else toast('❌ 失败');
  } catch(ex) { toast('❌ 网络错误'); }
});

// Save URLs
document.getElementById('btn-save-urls').addEventListener('click', async () => {
  const ollama = document.getElementById('ollama-url').value;
  const oo = document.getElementById('onlyoffice-url').value;
  await fetch('/api/admin/config', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ollama_url:ollama, onlyoffice_url:oo}),
  });
  toast('✅ 已保存');
});

// Flush cache
document.getElementById('btn-flush').addEventListener('click', async () => {
  const res = await fetch('/api/cache/flush', {method:'POST'});
  const d = await res.json();
  toast(`🗑️ 已清空 ${d.removed||0} 条`);
});

// Export config (encrypted)
document.getElementById('btn-export').addEventListener('click', async () => {
  const res = await fetch('/api/admin/export');
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'config.enc'; a.click();
  toast('📤 已导出加密配置');
});

// Import config (encrypted)
document.getElementById('file-import').addEventListener('change', async e => {
  const file = e.target.files[0];
  if(!file) return;
  const res = await fetch('/api/admin/import', {method:'POST', body:file});
  if(res.ok) { const d = await res.json(); toast(`📥 已导入 ${d.restored} 项配置`); }
  else toast('❌ 导入失败：文件无效或已损坏');
});

// Load current URLs
(async () => {
  try {
    const res = await fetch('/api/admin/config');
    const cfg = await res.json();
    if(cfg.ollama_url) document.getElementById('ollama-url').value = cfg.ollama_url;
    if(cfg.onlyoffice_url) document.getElementById('onlyoffice-url').value = cfg.onlyoffice_url;
  } catch(e) {}
})();

// ── Scinet panel ──
async function refreshScinet() {
  const statusEl = document.getElementById('scinet-status');
  const detailsEl = document.getElementById('scinet-details');
  try {
    const res = await fetch('/api/scinet/status');
    const s = await res.json();
    if (s.running) {
      statusEl.textContent = '🟢 运行中';
      statusEl.style.background = 'rgba(102,204,136,0.2)';
      statusEl.style.color = '#6c8';
      detailsEl.innerHTML =
        `端口: ${s.port} | 运行: ${Math.floor(s.uptime_seconds/60)}分钟<br>` +
        `请求: ${s.total_requests} (成功:${s.success_requests} 失败:${s.failed_requests})<br>` +
        `流量: ${s.bandwidth_mb}MB | <a href="${s.pac_url}" target="_blank">PAC配置</a>`;
    } else {
      statusEl.textContent = '⚫ 已停止';
      statusEl.style.background = 'rgba(136,136,136,0.2)';
      statusEl.style.color = '#888';
      detailsEl.textContent = 'Scinet 未启动';
    }
  } catch(e) {
    statusEl.textContent = '⚠ 不可用';
    statusEl.style.background = 'rgba(224,80,80,0.2)';
    statusEl.style.color = '#e05050';
    detailsEl.textContent = '无法连接 Scinet 服务';
  }
}
document.getElementById('btn-scinet-start').addEventListener('click', async () => {
  await fetch('/api/scinet/start', {method:'POST'});
  setTimeout(refreshScinet, 500);
  toast('Scinet 已启动');
});
document.getElementById('btn-scinet-stop').addEventListener('click', async () => {
  await fetch('/api/scinet/stop', {method:'POST'});
  setTimeout(refreshScinet, 500);
  toast('Scinet 已停止');
});
refreshScinet();
</script>
</body>
</html>
