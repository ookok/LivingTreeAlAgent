# Schema defined in agent_schema.py
# https://github.com/crow-cli/crow-cli

identity = "crowai.dev"
name = "crow-cli"
short_name = "crow-cli"
url = "https://crow-ai.dev"
protocol = "acp"
author_name = "Thomas Wood"
author_url = "https://crow-ai.dev"
publisher_name = "Thomas Wood"
publisher_url = "https://crow-ai.dev"
type = "coding"
description = "Minimal ACP Native Coding Agent. A reference implementation of the Agent Client Protocol with zero frameworks—just pure Python, OpenAI SDK, FastMCP, and SQLAlchemy."
tags = []
run_command."*" = "crow-cli acp"

help = '''
# crow-cli

Minimal ACP Native Coding Agent.

Run `uvx crow-cli init` to configure before running.

'''


[actions."*".install]
command = "uv tool install crow-cli --no-cache --python 3.14"
description = "Install crow-cli"


[actions."*".update]
command = "uv tool upgrade crow-cli --no-cache --python 3.14"
description = "Upgrade crow-cli"
