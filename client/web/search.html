<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌳 LivingTree 搜索</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/layout.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei",sans-serif;background:var(--bg-base,#1a1b1d);color:var(--text-default,#d1d3db);min-height:100vh}
.search-page{max-width:860px;margin:0 auto;padding:20px}
.search-hero{text-align:center;padding:60px 20px 30px;transition:all .3s}
.search-hero.searching{padding:15px 20px;text-align:left;display:flex;align-items:center;gap:16px}
.search-logo{font-size:48px;margin-bottom:12px;transition:all .3s}
.search-hero.searching .search-logo{font-size:28px;margin:0}
.search-title{font-size:28px;font-weight:700;color:var(--brand-default,#0fdc78);margin-bottom:4px}
.search-hero.searching .search-title{font-size:18px;margin:0}
.search-sub{font-size:14px;color:var(--text-tertiary,#7f848e);margin-bottom:24px}
.search-hero.searching .search-sub{display:none}
.search-box-wrap{display:flex;align-items:center;max-width:640px;margin:0 auto;background:var(--bg-overlay-l1);border:2px solid var(--border-l1);border-radius:12px;overflow:hidden;transition:border-color .2s}
.search-box-wrap:focus-within{border-color:var(--brand-default,#0fdc78);box-shadow:0 0 0 3px rgba(15,220,120,0.15)}
.search-hero.searching .search-box-wrap{max-width:100%}
.search-input{flex:1;padding:14px 18px;font-size:16px;background:transparent;border:none;color:var(--text-default);outline:none;font-family:inherit}
.search-input::placeholder{color:var(--text-tertiary)}
.search-btn{padding:14px 24px;background:var(--brand-default,#0fdc78);color:var(--brand-onbrand,#0c0c0d);font-size:15px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;transition:background .15s;display:flex;align-items:center;gap:6px}
.search-btn:hover{background:var(--brand-hover,#0ab861)}
.search-btn.loading{opacity:.7;pointer-events:none}

/* Source tabs */
.src-tabs{display:flex;gap:8px;justify-content:center;margin:8px 0 0;flex-wrap:wrap}
.src-tab{padding:4px 12px;border-radius:14px;font-size:12px;background:var(--bg-overlay-l1);color:var(--text-secondary);cursor:pointer;transition:all .15s;border:1px solid transparent}
.src-tab:hover{border-color:var(--border-l2)}
.src-tab.active{background:var(--brand-default);color:var(--brand-onbrand)}

/* Stats bar */
.stats-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 0;font-size:12px;color:var(--text-tertiary);border-bottom:1px solid var(--border-l1);margin-bottom:8px;flex-wrap:wrap;gap:4px}
.stats-sources{display:flex;gap:8px}

/* Results */
.results{display:flex;flex-direction:column;gap:8px;padding-bottom:60px}

/* Cards */
.card-result{background:var(--bg-overlay-l1);border:1px solid var(--border-l1);border-radius:10px;padding:14px 18px;transition:all .15s;cursor:pointer;text-decoration:none;color:inherit;display:block}
.card-result:hover{border-color:var(--brand-default);background:var(--bg-overlay-l2)}
.card-type{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-right:8px;flex-shrink:0}
.card-type-web{background:rgba(63,133,255,.15);color:#3f85ff}
.card-type-knowledge{background:rgba(149,112,255,.15);color:#9570ff}
.card-type-document{background:rgba(15,220,120,.15);color:#0fdc78}
.card-type-diagram{background:rgba(226,138,0,.15);color:#e28a00}
.card-type-profile{background:rgba(0,184,248,.15);color:#00b8f8}
.card-url{font-size:11px;color:var(--accent-blue);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:4px}
.card-url img{width:14px;height:14px}
.card-summary{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:6px}
.card-meta{font-size:11px;color:var(--text-tertiary);margin-top:4px;display:flex;gap:12px}
.card-title-row{display:flex;align-items:center;gap:8px}
.card-title{font-size:15px;font-weight:500;color:var(--text-default);line-height:1.4}
.card-title a{color:inherit;text-decoration:none}
.card-title a:hover{color:var(--brand-default)}
.card-action-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;background:var(--brand-default);color:var(--brand-onbrand);cursor:pointer;border:none;margin-top:8px;transition:background .15s}
.card-action-btn:hover{background:var(--brand-hover)}

/* Suggest */
.suggest-box{position:absolute;top:100%;left:0;right:0;background:var(--bg-menu);border:1px solid var(--border-l2);border-radius:0 0 12px 12px;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:100;overflow:hidden;display:none}
.suggest-box.show{display:block}
.suggest-item{padding:10px 18px;font-size:14px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px}
.suggest-item:hover{background:var(--bg-hover)}
.suggest-item .suggest-icon{font-size:14px;color:var(--text-tertiary)}

/* Empty / Error */
.empty-state{padding:40px;text-align:center;color:var(--text-tertiary)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}

/* Loading spinner */
.spinner-wrap{text-align:center;padding:40px}
.spinner{width:32px;height:32px;border:3px solid var(--bg-overlay-l2);border-top-color:var(--brand-default);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="search-page">
  <div class="search-hero" id="search-hero">
    <div class="search-logo">🌳</div>
    <div class="search-title">LivingTree 智能搜索</div>
    <div class="search-sub">AI驱动 · 多源融合 · 卡片化结果</div>
    <div style="position:relative;max-width:640px;margin:0 auto">
      <div class="search-box-wrap">
        <input class="search-input" id="search-input" placeholder="输入关键词搜索..." autocomplete="off" autofocus>
        <button class="search-btn" id="search-btn" onclick="doSearch()">
          <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="7" cy="7" r="5.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M11 11l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>搜索</span>
        </button>
      </div>
      <div class="suggest-box" id="suggest-box"></div>
    </div>
    <div class="src-tabs" id="src-tabs">
      <span class="src-tab active" data-src="web">🌐 网页</span>
      <span class="src-tab active" data-src="knowledge">🧠 知识库</span>
      <span class="src-tab active" data-src="docs">📄 文档</span>
      <span class="src-tab active" data-src="structured">📊 结构化</span>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar" style="display:none"></div>
  <div class="results" id="results"></div>
</div>

<script src="core/framework.js"></script>
<script>
let currentQuery = '';
const activeSources = new Set(['web', 'knowledge', 'docs', 'structured']);

// Source tabs
document.getElementById('src-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.src-tab');
  if (!tab) return;
  const src = tab.dataset.src;
  if (activeSources.has(src)) { activeSources.delete(src); tab.classList.remove('active'); }
  else { activeSources.add(src); tab.classList.add('active'); }
  if (currentQuery) doSearch();
});

// Search
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  currentQuery = q;

  const hero = document.getElementById('search-hero');
  hero.classList.add('searching');
  document.getElementById('stats-bar').style.display = 'flex';

  const btn = document.getElementById('search-btn');
  btn.classList.add('loading');
  btn.querySelector('span').textContent = '搜索中';

  document.getElementById('results').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div></div>';

  try {
    const resp = await fetch('/api/search/unified', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q, sources: [...activeSources], limit: 20 }),
    });
    const data = await resp.json();
    renderResults(data);
  } catch (e) {
    document.getElementById('results').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div>搜索服务暂不可用</div>`;
  }

  btn.classList.remove('loading');
  btn.querySelector('span').textContent = '搜索';
}

// Enter key
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { document.getElementById('suggest-box').classList.remove('show'); doSearch(); }
});

// Suggestions
let suggestTimer;
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(suggestTimer);
  const q = this.value.trim();
  if (q.length < 2) { document.getElementById('suggest-box').classList.remove('show'); return; }
  suggestTimer = setTimeout(async () => {
    try {
      const r = await fetch(`/api/search/suggest?q=${encodeURIComponent(q)}`);
      const items = await r.json();
      const box = document.getElementById('suggest-box');
      if (items.length) {
        box.innerHTML = items.map(s => `<div class="suggest-item" onclick="selectSuggest('${s.replace(/'/g, '\\\'')}')"><span class="suggest-icon">🔍</span>${s}</div>`).join('');
        box.classList.add('show');
      }
    } catch (e) {}
  }, 200);
});

function selectSuggest(text) {
  document.getElementById('search-input').value = text;
  document.getElementById('suggest-box').classList.remove('show');
  doSearch();
}

// Click outside to close suggest
document.addEventListener('click', e => {
  if (!e.target.closest('#suggest-box') && !e.target.closest('#search-input')) {
    document.getElementById('suggest-box').classList.remove('show');
  }
});

// Render
function renderResults(data) {
  const container = document.getElementById('results');
  const stats = document.getElementById('stats-bar');
  const sc = data.source_counts || {};

  stats.innerHTML = `
    <span>找到约 <strong style="color:var(--brand-default)">${data.total}</strong> 个结果</span>
    <div class="stats-sources">
      <span style="color:#3f85ff">🌐 ${sc.web || 0}</span>
      <span style="color:#9570ff">🧠 ${sc.knowledge || 0}</span>
      <span style="color:#0fdc78">📄 ${sc.document || 0}</span>
      <span style="color:#e28a00">📊 ${sc.diagram || 0}</span>
    </div>`;

  if (!data.results.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div>未找到相关结果<br><span style="font-size:12px;color:var(--text-tertiary)">尝试换个关键词，或启用更多数据源</span></div>`;
    return;
  }

  container.innerHTML = data.results.map(r => renderCard(r)).join('');
}

function renderCard(r) {
  const typeMap = {
    web: { cls: 'card-type-web', icon: '🌐', label: '网页' },
    knowledge: { cls: 'card-type-knowledge', icon: '🧠', label: '知识库' },
    document: { cls: 'card-type-document', icon: '📄', label: '文档' },
    diagram: { cls: 'card-type-diagram', icon: '📊', label: '图表' },
    profile: { cls: 'card-type-profile', icon: '👤', label: '模板' },
  };
  const tm = typeMap[r.type] || typeMap.web;

  let body = '';
  switch (r.type) {
    case 'web':
      body = `
        <div class="card-url">${r.favicon ? `<img src="${r.favicon}" alt="">` : ''}${r.url || ''}</div>
        <div class="card-summary">${r.summary || ''}</div>
        <div class="card-meta"><span>${r.source || 'web'}</span></div>`;
      break;
    case 'knowledge':
      body = `
        <div class="card-summary">${r.text || ''}</div>
        <div class="card-meta"><span>相关度: ${Math.round((r.score || 0) * 100)}%</span><span>${r.source_type || ''}</span></div>`;
      break;
    case 'document':
      body = `
        <div class="card-meta"><span>${r.format || 'docx'}</span><span>${r.size ? (r.size/1024).toFixed(1) + 'KB' : ''}</span><span>${r.updated_at ? new Date(r.updated_at*1000).toLocaleString('zh-CN') : ''}</span></div>
        <button class="card-action-btn" onclick="openDoc('${r.doc_id}')">在 OnlyOffice 中打开</button>`;
      break;
    case 'diagram':
      body = `
        <div class="card-summary">${r.description || '点击生成图表'}</div>
        <button class="card-action-btn" onclick="LT.emit('doc:create',{content:'生成 ${r.diagram_type} 图表',title:'${r.title}'})">生成图表</button>`;
      break;
    case 'profile':
      body = `
        <div class="card-meta"><span>${r.fields || 0} 个字段</span></div>`;
      break;
  }

  return `<div class="card-result" ${r.type === 'web' ? `onclick="window.open('${r.url}','_blank')"` : ''}>
    <div class="card-title-row">
      <span class="card-type ${tm.cls}">${tm.icon} ${tm.label}</span>
      <span class="card-title">${r.title || 'Untitled'}</span>
    </div>
    ${body}
  </div>`;
}

function openDoc(docId) {
  if (window.opener && window.opener.OnlyOffice) {
    window.opener.OnlyOffice.toggleSplit();
    window.opener.LT.emit('doc:open', { docId });
    window.close();
  } else {
    window.open(`/?doc=${docId}`, '_blank');
  }
}
</script>
</body>
</html>
