# LivingTree AI Agent — Docker Compose (Development + Production)

version: "3.9"

services:
  livingtree:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livingtree
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Mount config for API keys (secrets.enc + config.yaml)
      - ./config:/app/config:ro
      # Persistent data (SQLite, checkpoints, FAISS indexes)
      - livingtree_data:/app/data
    environment:
      - LT_OBSERVABILITY_LOG_LEVEL=INFO
      - LT_API_HOST=0.0.0.0
      - LT_API_PORT=8080
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
          cpus: "0.5"

  # Ollama sidecar (local LLM fallback — optional)
  ollama:
    image: ollama/ollama:latest
    container_name: livingtree-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-llm

volumes:
  livingtree_data:
  ollama_data:
