<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 — LivingTree AI Agent</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/app.css">
<style>
.login-logo{font-size:56px;margin-bottom:10px}
.login-title{font-size:22px;font-weight:700;color:var(--brand-default);margin-bottom:2px}
.login-sub{font-size:13px;color:var(--text-tertiary);margin-bottom:26px}
.login-btn{width:100%;height:46px;border-radius:10px;font-size:15px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.login-btn-wework{background:#267ef0;color:#fff;margin-bottom:10px}
.login-btn-wework:hover{background:#1e6dd4}
.login-btn-qr{background:var(--bg-overlay-l2);color:var(--text-default)}
.login-btn-qr:hover{background:var(--bg-overlay-l3)}
.qr-wrap{display:none;margin-top:14px}
.qr-wrap.show{display:block}
.qr-code{width:200px;height:200px;margin:0 auto 10px;background:#fff;padding:8px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.qr-placeholder{font-size:32px;animation:statusPulse 2s ease-in-out infinite}
.qr-hint{font-size:12px;color:var(--text-tertiary)}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:.5}}
.login-error{color:var(--text-danger);font-size:12px;margin-top:10px;display:none}
.login-error.show{display:block}
.login-info{font-size:11px;color:var(--text-tertiary);margin-top:22px;line-height:1.6}
</style>
</head>
<body class="page-center">
<div class="page-card">
  <div class="login-logo">🌳</div>
  <div class="login-title">LivingTree AI Agent</div>
  <div class="login-sub">企业微信统一登录</div>

  <button class="login-btn login-btn-wework" id="btn-wework" onclick="doOAuthLogin()">
    <svg width="20" height="20" viewBox="0 0 20 20"><rect x="2" y="3" width="16" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M6 8h8M6 11h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    <span>企业微信登录</span>
  </button>

  <div class="app-divider">或</div>

  <button class="login-btn login-btn-qr" id="btn-qr" onclick="toggleQR()">
    <svg width="20" height="20" viewBox="0 0 20 20"><rect x="3" y="3" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="3" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="11" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="13" width="4" height="4" rx="1" fill="currentColor"/></svg>
    <span>扫码登录</span>
  </button>

  <div class="qr-wrap" id="qr-wrap">
    <div class="qr-code" id="qr-code">
      <div class="app-spinner" id="qr-spinner" style="display:none"></div>
      <span class="qr-placeholder" id="qr-placeholder">📱</span>
      <img id="qr-img" style="display:none;width:184px;height:184px">
    </div>
    <div class="qr-hint" id="qr-hint">请使用企业微信扫描二维码</div>
  </div>

  <div class="login-error" id="login-error"></div>

  <div class="login-info">仅限企业用户登录 · 在企微客户端内自动静默登录</div>
</div>

<script src="services/login.js"></script>
</body>
</html>
