[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (DB/resources)
    slow: Slow tests (network/external API)
    ui: UI component tests
    livingtree: livingtree core package tests
    provider: Provider/model adapter tests

addopts = -v --tb=short

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
