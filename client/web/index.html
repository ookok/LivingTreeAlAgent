<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌳 LivingTree</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
<script src="js/living-a2ui.js" defer></script>
<script src="js/localfs.js" defer></script>
<script src="services/chat-renderer.js" defer></script>
<script src="services/sse-client.js" defer></script>
<style>
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg-enter { animation:fadeIn .3s ease-out }
  .typing-dot { animation:blink 1.4s infinite both }
  .typing-dot:nth-child(2){animation-delay:.2s}
  .typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
  ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
</style>
</head>
<body class="h-full bg-gray-50 text-gray-900 antialiased">

<!-- ═══ Layout ═══ -->
<div class="flex h-full">

  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 bg-white border-r border-gray-200 flex-shrink-0 hidden lg:flex flex-col">
    <div class="p-4 border-b border-gray-100">
      <h1 class="text-lg font-bold text-gray-800">🌳 LivingTree</h1>
      <p class="text-xs text-gray-400 mt-1">Digital Lifeform v2.5</p>
    </div>

    <!-- Folder Mount -->
    <div class="p-3 border-b border-gray-100">
      <button onclick="xiaoshu.mountFolder()" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">
        <span>📂</span> 选择文件夹
      </button>
      <div id="mounts-list" class="mt-2 space-y-1 text-xs"></div>
    </div>

    <!-- Quick Actions -->
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      <p class="text-xs font-medium text-gray-400 px-3 py-1">快捷操作</p>
      <button onclick="sendMsg('扫描代码库')" class="w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-lg">🔍 扫描代码</button>
      <button onclick="sendMsg('分析热点文件')" class="w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-lg">🔥 热点分析</button>
      <button onclick="sendMsg('外部学习')" class="w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-lg">📚 外部学习</button>
      <button hx-get="/static/evolution.html" hx-target="#evo-inline" class="w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-lg">🧬 自进化</button>
      <div id="evo-inline" class="text-xs"></div>
    </nav>
  </aside>

  <!-- Main Chat -->
  <main class="flex-1 flex flex-col min-w-0">
    <!-- Top bar -->
    <header class="flex items-center justify-between px-4 py-2 border-b border-gray-200 bg-white flex-shrink-0">
      <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="lg:hidden p-1 text-gray-500">☰</button>
      <div class="flex items-center gap-3">
        <span id="presence-text" class="text-xs text-gray-400">🌿</span>
        <span id="shield-indicator" class="text-xs cursor-pointer" title="防护状态" onclick="fetch('/api/shield/status').then(r=>r.json()).then(d=>alert(d.hitl_pending>0?'⚠️ 待处理: '+d.hitl_pending:'🛡️ 安全'))">🛡️</span>
      </div>
    </header>

    <!-- Messages -->
    <div id="chat-area" class="flex-1 overflow-y-auto px-4 py-6 space-y-4">
      <div class="msg-enter flex gap-3 max-w-3xl mx-auto">
        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-sm flex-shrink-0">🌳</div>
        <div class="bg-white rounded-2xl rounded-tl-none shadow-sm px-4 py-3 max-w-2xl">
          <p class="text-sm text-gray-700">你好，我是小树 🌱<br>可以帮你分析代码、搜索论文、进化项目。<br>试试拖拽文件夹到此处，或者输入消息开始。</p>
          <div class="mt-3 flex flex-wrap gap-2">
            <button onclick="sendMsg('扫描代码库')" class="text-xs px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 transition-colors">🔍 扫描代码</button>
            <button onclick="sendMsg('分析项目热点')" class="text-xs px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 transition-colors">🔥 热点分析</button>
            <button onclick="xiaoshu.mountFolder()" class="text-xs px-3 py-1.5 bg-blue-50 hover:bg-blue-100 rounded-full text-blue-600 transition-colors">📂 选择文件夹</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Task Status Bar (fixed above input) -->
    <div id="task-bar" class="hidden border-t border-gray-200 bg-white px-4 py-2 flex-shrink-0"></div>

    <!-- Input Area -->
    <div class="border-t border-gray-200 bg-white px-4 py-3 flex-shrink-0">
      <div class="max-w-3xl mx-auto flex items-end gap-2">
        <button onclick="xiaoshu.mountFolder()" title="选择文件夹" class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors flex-shrink-0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </button>
        <textarea id="msg-input" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"
          class="flex-1 resize-none border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 max-h-32"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,128)+'px'"></textarea>
        <button onclick="sendMsg()" class="p-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-colors flex-shrink-0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <p class="text-xs text-gray-400 text-center mt-1.5">TreeLLM 28 providers | 拖拽文件夹到此处直接挂载</p>
    </div>
  </main>
</div>

<!-- ═══ Core Logic ═══ -->
<script>
window.LT = window.LT || {};
LT.esc = function(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };

/* Message sending via chat renderer */
function sendMsg(text) {
  const input = document.getElementById('msg-input');
  const msg = text || input.value.trim();
  if (!msg) return;
  if (!text) { input.value = ''; input.style.height = 'auto'; }
  LT.chat.sendMsg(msg);
}

/* Folder mount callback */
window.xiaoshu = window.xiaoshu || {};
xiaoshu.emit = function(event, data) {
  if (event === 'mount') {
    document.getElementById('mounts-list').insertAdjacentHTML('beforeend',
      `<div class="flex items-center justify-between px-2 py-1 bg-gray-50 rounded text-gray-600">
        <span>📁 ${LT.esc(data.name)}</span>
        <span class="text-gray-400">${data.fileCount||0} 文件</span>
      </div>`);
    sendMsg('分析文件夹: '+data.name);
  }
};

/* Drag & drop folder */
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', async e => {
  e.preventDefault();
  const items = [...e.dataTransfer.items];
  for (const item of items) {
    if (item.kind === 'file') {
      const handle = await item.getAsFileSystemHandle();
      if (handle && handle.kind === 'directory') {
        xiaoshu.emit('mount', {name: handle.name, fileCount: '?'});
      }
    }
  }
});

/* Real-time: SSE connection for vitals + task updates (auto-reconnect, replaces polling) */
document.addEventListener('DOMContentLoaded', function() {
  if (window.LT && LT.sse) {
    LT.sse.connect('/api/stream/vitals', {
      vitals: function(data) {
        var el = document.getElementById('presence-text');
        if (el) el.textContent = (data.leaf_display||{}).message || '🌿';
      },
      shield: function(data) {
        var el = document.getElementById('shield-indicator');
        if (el) el.textContent = data.hitl_pending > 0 ? '⚠️' : '🛡️';
      },
      task_update: function(data) {
        if (window.LT && LT.chat && LT.chat.renderer) {
          var tasks = (data.tasks||[]).map(function(t) {
            return {id: t.id, label: t.label, name: t.label, status: t.status, result: t.result};
          });
          if (tasks.length) LT.chat.renderer.taskList(null, tasks, data.streaming);
        }
      }
    });
  }
});
</script>
</body>
</html>
