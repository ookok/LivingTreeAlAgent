<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI算力仪表盘 - Hardware Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .privacy-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 12px;
        }

        /* Scan Button */
        .scan-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .scan-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .scan-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(99, 102, 241, 0.5);
        }

        .scan-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .scan-btn .icon {
            margin-right: 8px;
        }

        /* Loading Spinner */
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 40px 0;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 16px;
            color: var(--text-secondary);
        }

        .loading-steps {
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--primary);
        }

        /* Hardware Cards Grid */
        .hardware-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .hardware-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .hardware-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .card-icon.cpu { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .card-icon.ram { background: linear-gradient(135deg, #10b981, #059669); }
        .card-icon.gpu { background: linear-gradient(135deg, #ef4444, #dc2626); }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .card-subtitle {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .card-content {
            space-y: 12px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stat-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .stat-value.highlight {
            color: var(--success);
            font-size: 1.1rem;
        }

        /* Models Section */
        .models-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }

        .model-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .model-card:hover {
            border-color: var(--primary);
        }

        .model-card.recommended {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.05);
        }

        .model-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .model-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .model-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-excellent {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .badge-good {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
        }

        .badge-moderate {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .badge-slow {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .model-stats {
            display: flex;
            gap: 16px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .model-stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .model-stat .value {
            color: var(--text-primary);
            font-weight: 600;
        }

        .recommended-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--success);
            font-size: 0.75rem;
            margin-top: 8px;
        }

        /* Performance Bar */
        .perf-bar-container {
            margin-top: 8px;
        }

        .perf-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .perf-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .perf-bar-fill.excellent { background: var(--success); }
        .perf-bar-fill.good { background: var(--primary); }
        .perf-bar-fill.moderate { background: var(--warning); }
        .perf-bar-fill.slow { background: var(--danger); }

        /* Summary Card */
        .summary-card {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            margin-bottom: 40px;
        }

        .summary-title {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .summary-model {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .summary-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .summary-stat {
            text-align: center;
        }

        .summary-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .summary-stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* WebGL Detection Canvas */
        #glCanvas {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .hardware-grid {
                grid-template-columns: 1fr;
            }

            .summary-stats {
                flex-direction: column;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🖥️ AI算力仪表盘</h1>
            <p>本地硬件检测 · 21+ AI模型匹配 · 性能预估</p>
            <div class="privacy-badge">
                <span>🔒</span>
                <span>100% 本地运行 · 无数据上传</span>
            </div>
        </div>

        <!-- Scan Button -->
        <div class="scan-section">
            <button class="scan-btn" id="scanBtn" onclick="startDetection()">
                <span class="icon">⚡</span>
                <span id="scanBtnText">开始硬件检测</span>
            </button>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">正在检测硬件...</div>
            <div class="loading-steps" id="loadingSteps"></div>
        </div>

        <!-- Results -->
        <div id="results" class="hidden">
            <!-- Summary -->
            <div class="summary-card">
                <div class="summary-title">推荐运行模型</div>
                <div class="summary-model" id="recommendedModel">-</div>
                <div class="summary-stats">
                    <div class="summary-stat">
                        <div class="summary-stat-value" id="summarySpeed">-</div>
                        <div class="summary-stat-label">tokens/sec 预估</div>
                    </div>
                    <div class="summary-stat">
                        <div class="summary-stat-value" id="summaryVRAM">-</div>
                        <div class="summary-stat-label">VRAM需求 (GB)</div>
                    </div>
                    <div class="summary-stat">
                        <div class="summary-stat-value" id="summaryRAM">-</div>
                        <div class="summary-stat-label">系统内存 (GB)</div>
                    </div>
                </div>
            </div>

            <!-- Hardware Cards -->
            <div class="hardware-grid">
                <!-- CPU Card -->
                <div class="hardware-card">
                    <div class="card-header">
                        <div class="card-icon cpu">⚙️</div>
                        <div>
                            <div class="card-title">处理器 (CPU)</div>
                            <div class="card-subtitle" id="cpuName">检测中...</div>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="stat-row">
                            <span class="stat-label">核心数</span>
                            <span class="stat-value" id="cpuCores">-</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">线程数</span>
                            <span class="stat-value" id="cpuThreads">-</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">架构</span>
                            <span class="stat-value" id="cpuArch">-</span>
                        </div>
                    </div>
                </div>

                <!-- RAM Card -->
                <div class="hardware-card">
                    <div class="card-header">
                        <div class="card-icon ram">💾</div>
                        <div>
                            <div class="card-title">内存 (RAM)</div>
                            <div class="card-subtitle" id="ramType">检测中...</div>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="stat-row">
                            <span class="stat-label">总内存</span>
                            <span class="stat-value highlight" id="ramTotal">-</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">可用内存</span>
                            <span class="stat-value" id="ramAvailable">-</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">可用率</span>
                            <span class="stat-value" id="ramPercent">-</span>
                        </div>
                    </div>
                </div>

                <!-- GPU Card -->
                <div class="hardware-card">
                    <div class="card-header">
                        <div class="card-icon gpu">🎮</div>
                        <div>
                            <div class="card-title">显卡 (GPU)</div>
                            <div class="card-subtitle" id="gpuName">检测中...</div>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="stat-row">
                            <span class="stat-label">渲染器</span>
                            <span class="stat-value" id="gpuRenderer">-</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">估算VRAM</span>
                            <span class="stat-value highlight" id="gpuVRAM">-</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">WebGL</span>
                            <span class="stat-value" id="webglStatus">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Models Section -->
            <div class="models-section">
                <div class="section-title">
                    <span>🤖</span>
                    <span>AI模型兼容性</span>
                    <span id="modelCount" style="font-size: 0.9rem; color: var(--text-secondary);"></span>
                </div>
                <div class="models-grid" id="modelsGrid"></div>
            </div>
        </div>
    </div>

    <!-- Hidden Canvas for WebGL -->
    <canvas id="glCanvas" width="1" height="1"></canvas>

    <script>
        // ========== AI Models Database ==========
        const AI_MODELS = [
            { name: "GPT-4", provider: "OpenAI", params: "~1T", vram: 0, type: "api", minRAM: 8, cpuOnly: true },
            { name: "GPT-3.5-Turbo", provider: "OpenAI", params: "~20B", vram: 0, type: "api", minRAM: 4, cpuOnly: true },
            { name: "Llama-2-7B", provider: "Meta", params: "7B", vram: 6, minRAM: 8, minSpeed: 30 },
            { name: "Llama-2-13B", provider: "Meta", params: "13B", vram: 12, minRAM: 16, minSpeed: 20 },
            { name: "Llama-2-70B", provider: "Meta", params: "70B", vram: 48, minRAM: 64, minSpeed: 8, needsSplit: true },
            { name: "Mistral-7B", provider: "Mistral", params: "7B", vram: 6, minRAM: 8, minSpeed: 35 },
            { name: "Mixtral-8x7B", provider: "Mistral", params: "8x7B", vram: 24, minRAM: 32, minSpeed: 15, needsSplit: true },
            { name: "Qwen-1.5-7B", provider: "Alibaba", params: "7B", vram: 6, minRAM: 8, minSpeed: 32 },
            { name: "Qwen-1.5-14B", provider: "Alibaba", params: "14B", vram: 14, minRAM: 16, minSpeed: 22 },
            { name: "Qwen-1.5-72B", provider: "Alibaba", params: "72B", vram: 48, minRAM: 64, minSpeed: 10, needsSplit: true },
            { name: "Qwen-2.5-7B", provider: "Alibaba", params: "7B", vram: 6, minRAM: 8, minSpeed: 38 },
            { name: "Qwen-2.5-14B", provider: "Alibaba", params: "14B", vram: 14, minRAM: 16, minSpeed: 26 },
            { name: "ChatGLM2-6B", provider: "Zhipu", params: "6B", vram: 5, minRAM: 8, minSpeed: 40 },
            { name: "ChatGLM3-6B", provider: "Zhipu", params: "6B", vram: 5, minRAM: 8, minSpeed: 42 },
            { name: "Baichuan2-7B", provider: "Baichuan", params: "7B", vram: 6, minRAM: 8, minSpeed: 33 },
            { name: "Baichuan2-13B", provider: "Baichuan", params: "13B", vram: 12, minRAM: 16, minSpeed: 21 },
            { name: "Yi-6B", provider: "01.AI", params: "6B", vram: 6, minRAM: 8, minSpeed: 36 },
            { name: "Yi-34B", provider: "01.AI", params: "34B", vram: 24, minRAM: 32, minSpeed: 12 },
            { name: "DeepSeek-7B", provider: "DeepSeek", params: "7B", vram: 6, minRAM: 8, minSpeed: 34 },
            { name: "DeepSeek-33B", provider: "DeepSeek", params: "33B", vram: 24, minRAM: 32, minSpeed: 14 },
            { name: "Falcon-7B", provider: "TII", params: "7B", vram: 6, minRAM: 8, minSpeed: 31 },
            { name: "Falcon-40B", provider: "TII", params: "40B", vram: 32, minRAM: 48, minSpeed: 9, needsSplit: true },
            { name: "Vicuna-7B", provider: "LMSYS", params: "7B", vram: 6, minRAM: 8, minSpeed: 30 },
            { name: "Vicuna-13B", provider: "LMSYS", params: "13B", vram: 12, minRAM: 16, minSpeed: 19 },
        ];

        // ========== Detection State ==========
        let detectionResult = null;

        // ========== Detection Functions ==========
        async function startDetection() {
            const btn = document.getElementById('scanBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');

            btn.disabled = true;
            btn.innerHTML = '<span class="icon">⏳</span> 检测中...';
            loading.classList.add('active');
            results.classList.add('hidden');

            try {
                const steps = ['检测CPU信息', '检测内存状态', '检测GPU性能', '匹配AI模型', '生成报告'];
                let stepIndex = 0;

                const updateStep = (text) => {
                    document.getElementById('loadingSteps').textContent = text;
                };

                // Step 1: CPU Detection
                updateStep(steps[stepIndex++]);
                await delay(300);
                const cpuInfo = detectCPU();

                // Step 2: RAM Detection
                updateStep(steps[stepIndex++]);
                await delay(300);
                const ramInfo = detectRAM();

                // Step 3: GPU Detection
                updateStep(steps[stepIndex++]);
                await delay(300);
                const gpuInfo = detectGPU();

                // Step 4: Model Matching
                updateStep(steps[stepIndex++]);
                await delay(300);
                const models = matchModels(cpuInfo, ramInfo, gpuInfo);

                // Step 5: Build Result
                updateStep(steps[stepIndex++]);
                await delay(300);

                detectionResult = {
                    status: "success",
                    timestamp: new Date().toISOString(),
                    hardware: {
                        cpuCores: cpuInfo.cores,
                        cpuThreads: cpuInfo.threads,
                        cpuModel: cpuInfo.model,
                        cpuArch: cpuInfo.arch,
                        ramTotalGB: ramInfo.totalGB,
                        ramAvailableGB: ramInfo.availableGB,
                        ramType: ramInfo.type,
                        gpuRenderer: gpuInfo.renderer,
                        gpuVRAM: gpuInfo.vramGB,
                        gpuVendor: gpuInfo.vendor,
                        hasWebGL: gpuInfo.hasWebGL,
                        hasGPU: gpuInfo.hasGPU
                    },
                    recommendedModels: models
                };

                // Display results
                displayResults(detectionResult);

                // Notify Python via callback
                if (window.aiDetectorComplete) {
                    window.aiDetectorComplete(detectionResult);
                }

                // Hide loading, show results
                loading.classList.remove('active');
                results.classList.remove('hidden');

            } catch (error) {
                console.error("Detection error:", error);
                alert("检测过程中出现错误: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span class="icon">🔄</span> 重新检测';
            }
        }

        function detectCPU() {
            const cores = navigator.hardwareConcurrency || 4;
            const threads = cores * 2; // Estimate hyperthreading

            // Try to get more CPU info via performance API
            let model = "Unknown CPU";
            let arch = "Unknown";

            try {
                // Use a simple heuristic based on available info
                const performance = performance || {};
                if (performance.memory) {
                    // Chrome-specific
                }
            } catch (e) {}

            // Detect architecture
            const platform = navigator.platform || "";
            if (platform.includes("Win")) {
                arch = "x64";
            } else if (platform.includes("Mac")) {
                arch = platform.includes("ARM") ? "ARM64" : "x64";
            } else if (platform.includes("Linux")) {
                arch = "x64";
            }

            // Try to detect more specific CPU info
            const ua = navigator.userAgent;
            if (ua.includes("Intel")) {
                if (ua.includes("i9")) model = "Intel Core i9";
                else if (ua.includes("i7")) model = "Intel Core i7";
                else if (ua.includes("i5")) model = "Intel Core i5";
                else if (ua.includes("i3")) model = "Intel Core i3";
                else model = "Intel CPU";
            } else if (ua.includes("AMD")) {
                if (ua.includes("Ryzen")) model = "AMD Ryzen";
                else model = "AMD CPU";
            }

            return {
                cores: cores,
                threads: threads,
                model: model,
                arch: arch
            };
        }

        function detectRAM() {
            let totalGB = 8; // Default
            let availableGB = 4;
            let type = "Unknown";

            // Try DeviceMemory API (Chrome)
            if (navigator.deviceMemory) {
                totalGB = navigator.deviceMemory;
            }

            // Try to get more accurate info
            try {
                if (performance && performance.memory) {
                    const usedMB = performance.memory.usedJSHeapSize;
                    const totalMB = performance.memory.totalJSHeapSize;
                    // This is JS heap, not system RAM, but we can use it for estimation
                }
            } catch (e) {}

            // Estimate available RAM based on total
            availableGB = Math.round(totalGB * 0.4);

            // Detect memory type based on available heuristics
            if (totalGB >= 32) type = "DDR5";
            else if (totalGB >= 16) type = "DDR4";
            else if (totalGB >= 8) type = "DDR4/DDR3";
            else type = "DDR3";

            return {
                totalGB: totalGB,
                availableGB: availableGB,
                type: type
            };
        }

        function detectGPU() {
            const canvas = document.getElementById('glCanvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

            let renderer = "集成显卡";
            let vendor = "Unknown";
            let vramGB = 0;
            let hasWebGL = false;
            let hasGPU = false;

            if (gl) {
                hasWebGL = true;
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if (debugInfo) {
                    renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                    hasGPU = true;
                }

                // Estimate VRAM from renderer string
                vramGB = estimateVRAM(renderer);

                // Clean up renderer name
                if (renderer.includes("NVIDIA")) {
                    const match = renderer.match(/RTX\s*(\d+)/i) || renderer.match(/GTX\s*(\d+)/i);
                    if (match) {
                        const series = parseInt(match[1]);
                        if (series >= 4000) vramGB = Math.max(vramGB, 12);
                        else if (series >= 3000) vramGB = Math.max(vramGB, 10);
                        else if (series >= 2000) vramGB = Math.max(vramGB, 8);
                        else if (series >= 1000) vramGB = Math.max(vramGB, 6);
                    }
                } else if (renderer.includes("AMD") || renderer.includes("Radeon")) {
                    const match = renderer.match(/RX\s*(\d+)/i);
                    if (match) {
                        const series = parseInt(match[1]);
                        if (series >= 6000) vramGB = Math.max(vramGB, 8);
                        else if (series >= 5000) vramGB = Math.max(vramGB, 6);
                    }
                } else if (renderer.includes("Apple")) {
                    if (renderer.includes("M1")) {
                        vramGB = 8; // M1 has unified memory
                        hasGPU = true;
                    } else if (renderer.includes("M2")) {
                        vramGB = 16;
                        hasGPU = true;
                    } else if (renderer.includes("M3")) {
                        vramGB = 18;
                        hasGPU = true;
                    }
                } else {
                    // Integrated graphics
                    vramGB = 2;
                    hasGPU = false;
                }
            }

            return {
                renderer: renderer,
                vendor: vendor,
                vramGB: vramGB,
                hasWebGL: hasWebGL,
                hasGPU: hasGPU
            };
        }

        function estimateVRAM(renderer) {
            const r = renderer.toLowerCase();

            // High-end GPUs
            if (r.includes("4090")) return 24;
            if (r.includes("4080")) return 16;
            if (r.includes("4070")) return 12;
            if (r.includes("3090")) return 24;
            if (r.includes("3080")) return 10;
            if (r.includes("3070")) return 8;
            if (r.includes("3060")) return 8;

            // AMD
            if (r.includes("7900")) return 20;
            if (r.includes("7800")) return 16;
            if (r.includes("7700")) return 12;
            if (r.includes("6800")) return 16;
            if (r.includes("6700")) return 12;

            // Mid-range
            if (r.includes("4060")) return 8;
            if (r.includes("4050")) return 6;
            if (r.includes("2080")) return 8;
            if (r.includes("2070")) return 8;
            if (r.includes("2060")) return 6;

            // Laptop GPUs
            if (r.includes("3070 laptop")) return 8;
            if (r.includes("3060 laptop")) return 6;
            if (r.includes("2050")) return 4;

            // Default estimates
            if (r.includes("nvidia")) return 6;
            if (r.includes("amd") || r.includes("radeon")) return 6;
            if (r.includes("intel")) return 2;

            return 2; // Default for unknown
        }

        function estimateSpeed(model, cpuCores, ramGB, vramGB, hasGPU) {
            // Base speed estimation (tokens/sec)
            let baseSpeed = 0;

            if (model.type === "api") {
                // API models don't run locally
                return 0;
            }

            const vram = model.vram || 0;

            if (!hasGPU && vram > 0) {
                // CPU only, will be very slow
                if (vram <= 6) baseSpeed = cpuCores * 2;
                else if (vram <= 13) baseSpeed = cpuCores * 1;
                else baseSpeed = 0.5;
            } else if (hasGPU && vramGB >= vram) {
                // GPU accelerated
                if (vram <= 6) baseSpeed = 40 + (vramGB - vram) * 5;
                else if (vram <= 12) baseSpeed = 30 + (vramGB - vram) * 3;
                else if (vram <= 24) baseSpeed = 20 + (vramGB - vram) * 2;
                else baseSpeed = 10;
            } else if (vram === 0) {
                // No VRAM requirement (CPU models)
                baseSpeed = 50;
            } else {
                // VRAM insufficient
                baseSpeed = 2;
            }

            // Adjust by RAM availability
            if (ramGB < model.minRAM) {
                baseSpeed = Math.min(baseSpeed, 5);
            }

            return Math.max(0, Math.round(baseSpeed));
        }

        function matchModels(cpu, ram, gpu) {
            const results = [];
            let recommended = null;
            let maxScore = 0;

            for (const model of AI_MODELS) {
                let compatibility = "unsupported";
                let speed = 0;

                // Check if can run
                if (model.type === "api") {
                    // API models always "run" (but don't need local resources)
                    compatibility = "api";
                    speed = 999; // Infinite for API
                } else if (ram.ramTotalGB < model.minRAM) {
                    compatibility = "insufficient_ram";
                    speed = 0;
                } else if (model.vram > 0 && !gpu.hasGPU) {
                    compatibility = "cpu_only";
                    speed = estimateSpeed(model, cpu.cores, ram.ramTotalGB, 0, false);
                    if (speed < 5) compatibility = "too_slow";
                } else if (model.vram > 0 && gpu.vramGB < model.vram) {
                    compatibility = "insufficient_vram";
                    speed = estimateSpeed(model, cpu.cores, ram.ramTotalGB, gpu.vramGB, false);
                    if (speed < 5) compatibility = "too_slow";
                } else {
                    // Can run
                    speed = estimateSpeed(model, cpu.cores, ram.ramTotalGB, gpu.vramGB, gpu.hasGPU);
                    if (model.minSpeed && speed >= model.minSpeed) {
                        compatibility = "excellent";
                    } else if (speed >= 30) {
                        compatibility = "excellent";
                    } else if (speed >= 20) {
                        compatibility = "good";
                    } else if (speed >= 10) {
                        compatibility = "moderate";
                    } else if (speed > 0) {
                        compatibility = "slow";
                    } else {
                        compatibility = "unsupported";
                    }
                }

                const score = compatibility === "excellent" ? 100 :
                              compatibility === "good" ? 75 :
                              compatibility === "moderate" ? 50 :
                              compatibility === "slow" ? 25 :
                              compatibility === "api" ? 60 :
                              compatibility === "cpu_only" ? 40 : 0;

                if (score > maxScore && compatibility !== "api") {
                    maxScore = score;
                    recommended = model;
                }

                results.push({
                    modelName: model.name,
                    provider: model.provider,
                    params: model.params,
                    vramRequired: model.vram,
                    compatibility: compatibility,
                    speedEstimate: speed,
                    recommended: false
                });
            }

            // Mark recommended
            if (recommended) {
                const recIndex = results.findIndex(r => r.modelName === recommended.name);
                if (recIndex >= 0) {
                    results[recIndex].recommended = true;
                    // Move to front
                    const rec = results.splice(recIndex, 1)[0];
                    results.unshift(rec);
                }
            }

            return results;
        }

        function displayResults(result) {
            const { hardware, recommendedModels } = result;

            // Update summary
            const rec = recommendedModels.find(m => m.recommended) || recommendedModels[0];
            document.getElementById('recommendedModel').textContent = rec ? rec.modelName : "-";
            document.getElementById('summarySpeed').textContent = rec && rec.speedEstimate > 0 ? rec.speedEstimate : "API";
            document.getElementById('summaryVRAM').textContent = rec ? (rec.vramRequired || "N/A") : "-";
            document.getElementById('summaryRAM').textContent = hardware.ramTotalGB;

            // Update CPU card
            document.getElementById('cpuName').textContent = hardware.cpuModel;
            document.getElementById('cpuCores').textContent = hardware.cpuCores;
            document.getElementById('cpuThreads').textContent = hardware.cpuThreads;
            document.getElementById('cpuArch').textContent = hardware.cpuArch;

            // Update RAM card
            document.getElementById('ramType').textContent = hardware.ramType;
            document.getElementById('ramTotal').textContent = hardware.ramTotalGB + " GB";
            document.getElementById('ramAvailable').textContent = hardware.ramAvailableGB + " GB";
            document.getElementById('ramPercent').textContent = Math.round(hardware.ramAvailableGB / hardware.ramTotalGB * 100) + "%";

            // Update GPU card
            document.getElementById('gpuName').textContent = hardware.gpuVendor || "GPU";
            document.getElementById('gpuRenderer').textContent = hardware.gpuRenderer;
            document.getElementById('gpuVRAM').textContent = hardware.gpuVRAM + " GB";
            document.getElementById('webglStatus').textContent = hardware.hasWebGL ? "✅ 支持" : "❌ 不支持";

            // Update models grid
            const grid = document.getElementById('modelsGrid');
            grid.innerHTML = '';

            const visibleModels = recommendedModels.filter(m =>
                m.compatibility !== "unsupported" && m.compatibility !== "insufficient_ram"
            ).slice(0, 24);

            document.getElementById('modelCount').textContent = `(${visibleModels.length} 个模型)`;

            for (const model of visibleModels) {
                const card = document.createElement('div');
                card.className = 'model-card' + (model.recommended ? ' recommended' : '');

                const badgeClass = model.compatibility === 'excellent' ? 'badge-excellent' :
                                   model.compatibility === 'good' ? 'badge-good' :
                                   model.compatibility === 'moderate' ? 'badge-moderate' :
                                   model.compatibility === 'slow' ? 'badge-slow' :
                                   model.compatibility === 'api' ? 'badge-good' :
                                   'badge-moderate';

                const badgeText = model.compatibility === 'excellent' ? '推荐' :
                                  model.compatibility === 'good' ? '良好' :
                                  model.compatibility === 'moderate' ? '一般' :
                                  model.compatibility === 'slow' ? '较慢' :
                                  model.compatibility === 'api' ? 'API' :
                                  model.compatibility === 'cpu_only' ? 'CPU运行' :
                                  model.compatibility === 'insufficient_vram' ? '显存不足' :
                                  '不支持';

                const perfPercent = model.compatibility === 'api' ? 100 :
                                    model.speedEstimate > 40 ? 90 :
                                    model.speedEstimate > 25 ? 70 :
                                    model.speedEstimate > 15 ? 50 :
                                    model.speedEstimate > 5 ? 30 : 10;

                const perfClass = perfPercent >= 70 ? 'excellent' :
                                  perfPercent >= 50 ? 'good' :
                                  perfPercent >= 30 ? 'moderate' : 'slow';

                card.innerHTML = `
                    <div class="model-header">
                        <span class="model-name">${model.modelName}</span>
                        <span class="model-badge ${badgeClass}">${badgeText}</span>
                    </div>
                    <div class="model-stats">
                        <span class="model-stat">
                            <span class="value">${model.params}</span>
                        </span>
                        ${model.vramRequired > 0 ? `
                        <span class="model-stat">
                            VRAM: <span class="value">${model.vramRequired}GB</span>
                        </span>
                        ` : ''}
                    </div>
                    ${model.compatibility !== 'api' ? `
                    <div class="perf-bar-container">
                        <div class="perf-bar">
                            <div class="perf-bar-fill ${perfClass}" style="width: ${perfPercent}%"></div>
                        </div>
                        <span style="font-size: 0.7rem; color: var(--text-secondary);">
                            ${model.speedEstimate > 0 ? model.speedEstimate + ' tok/s' : '无法运行'}
                        </span>
                    </div>
                    ` : ''}
                    ${model.recommended ? `
                    <div class="recommended-badge">
                        <span>⭐</span>
                        <span>最佳选择</span>
                    </div>
                    ` : ''}
                `;

                grid.appendChild(card);
            }
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Expose function for Python to call
        window.getDetectionResult = function() {
            return detectionResult;
        };

        // Auto-run detection on page load (optional)
        // setTimeout(startDetection, 500);
    </script>
