<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>环评智能工作台</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #app {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script type="text/javascript" src="qrc:///qtwebchannel/qwebchannel.js"></script>
  
  <script>
  // LivingTree Frontend Bridge
  // Bridges Vue frontend to livingtree backend API
  // When running in PyQt6, uses QWebChannel. Otherwise uses HTTP API.
  var LivingTreeBridge = {
    baseURL: window.location.origin + '/api',
    _channel: null,
    _backend: null,

    init: function() {
      if (typeof QWebChannel !== 'undefined') {
        new QWebChannel(qt.webChannelTransport, function(channel) {
          LivingTreeBridge._channel = channel;
          LivingTreeBridge._backend = channel.objects.backend;
        });
      }
    },

    chat: async function(message, sessionId) {
      // Try QWebChannel first
      if (this._backend && this._backend.sendMessage) {
        return this._backend.sendMessage(message, sessionId || '');
      }
      // Fallback to HTTP API
      try {
        var resp = await fetch(this.baseURL + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: message, session_id: sessionId || '' }),
        });
        return await resp.json();
      } catch (e) {
        return { type: 'error', error: e.message };
      }
    },

    health: async function() {
      try {
        var resp = await fetch(this.baseURL + '/health');
        return await resp.json();
      } catch (e) {
        return { status: 'error', error: e.message };
      }
    },

    getTools: async function() {
      try {
        var resp = await fetch(this.baseURL + '/tools');
        return await resp.json();
      } catch (e) {
        return { tools: [], error: e.message };
      }
    },

    getSkills: async function() {
      try {
        var resp = await fetch(this.baseURL + '/skills');
        return await resp.json();
      } catch (e) {
        return { skills: [], error: e.message };
      }
    }
  };

  LivingTreeBridge.init();
  </script>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
