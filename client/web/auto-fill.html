<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>自动填报 — LivingTree</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-50 py-8">
<div class="max-w-lg mx-auto px-4">
  <div class="bg-white rounded-2xl shadow-sm p-6 mb-4">
    <div class="flex items-center gap-3 mb-4">
      <span class="text-3xl">🌳</span>
      <div><h1 class="text-lg font-bold text-gray-800">自动填报助手</h1><p class="text-xs text-gray-400">AI 智能填充表单 · PageAgent + RAG</p></div>
    </div>

    <div class="space-y-4">
      <div class="flex gap-3">
        <span class="w-6 h-6 rounded-full bg-blue-600 text-white flex items-center justify-center text-xs font-bold flex-shrink-0">1</span>
        <div><p class="text-sm font-medium text-gray-700">安装桥梁脚本</p><p class="text-xs text-gray-500 mt-0.5">拖拽下方链接到书签栏</p></div>
      </div>
      <code class="block bg-gray-50 rounded-lg p-3 text-xs text-gray-600 break-all cursor-pointer select-all" onclick="navigator.clipboard.writeText(this.textContent)">javascript:(function(){var s=document.createElement('script');s.src='http://localhost:8100/services/page-agent-bridge.js';document.head.appendChild(s)})()</code>
      <button onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent)" class="w-full py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm text-gray-600 transition-colors">📋 复制书签代码</button>

      <div class="flex gap-3 mt-4">
        <span class="w-6 h-6 rounded-full bg-blue-600 text-white flex items-center justify-center text-xs font-bold flex-shrink-0">2</span>
        <div><p class="text-sm font-medium text-gray-700">打开目标网页并激活</p><p class="text-xs text-gray-500 mt-0.5">点击书签，右侧出现控制面板</p></div>
      </div>
      <div class="flex gap-3">
        <span class="w-6 h-6 rounded-full bg-blue-600 text-white flex items-center justify-center text-xs font-bold flex-shrink-0">3</span>
        <div><p class="text-sm font-medium text-gray-700">选择填报模板</p><p class="text-xs text-gray-500 mt-0.5">在面板中选择或创建填报模板</p></div>
      </div>
    </div>
  </div>

  <!-- Profile Manager -->
  <div class="bg-white rounded-2xl shadow-sm p-6">
    <h2 class="text-sm font-semibold text-gray-700 mb-3">📋 填报模板</h2>
    <div id="profiles-list" class="space-y-2 text-sm"></div>
    <div class="mt-4 space-y-3">
      <input id="profile-name" placeholder="模板名称" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
      <textarea id="profile-values" placeholder='{"company":"XX公司","name":"张三","phone":"13800138000"}' rows="3" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      <button onclick="saveProfile()" class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">保存模板</button>
    </div>
  </div>
</div>

<script>
async function loadProfiles() {
  try {
    const r = await fetch('/api/auto-fill/profiles');
    const d = await r.json();
    document.getElementById('profiles-list').innerHTML = (d.profiles||[]).map(p =>
      `<div class="flex justify-between items-center p-2 bg-gray-50 rounded-lg">
        <span class="font-medium">${p.name}</span>
        <span class="text-xs text-gray-400">${Object.keys(p.values||{}).length} 字段</span>
      </div>`
    ).join('') || '<p class="text-gray-400">暂无模板</p>';
  } catch(e) {}
}
async function saveProfile() {
  const name = document.getElementById('profile-name').value.trim();
  let values = {};
  try { values = JSON.parse(document.getElementById('profile-values').value); } catch(e) { alert('JSON格式错误'); return; }
  await fetch('/api/auto-fill/profiles', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,values}) });
  loadProfiles();
}
loadProfiles();
</script>
</body>
</html>
