ollama:
  base_url: "http://localhost:11434/v1"
  api_key: ""
  models:
    flash:
      name: "qwen3.5:0.8b"
      description: "轻量模型，适合快速响应"
      context_length: 4096
      max_tokens: 2048
      temperature: 0.3

    small:
      name: "qwen2.5:1.5b"
      description: "小型模型，平衡速度与质量"
      context_length: 4096
      max_tokens: 2048
      temperature: 0.5

    chat:
      name: "qwen3.5:4b"
      description: "中型模型，适合日常对话"
      context_length: 8192
      max_tokens: 4096
      temperature: 0.7

    pro:
      name: "qwen3.5:9b"
      description: "大型模型，适合复杂任务"
      context_length: 16384
      max_tokens: 8192
      temperature: 0.7
      thinking_enabled: true

    moe:
      name: "qwen3.6:35b-a3b"
      description: "专家混合模型，最强推理能力"
      context_length: 16384
      max_tokens: 8192
      temperature: 0.7
      thinking_enabled: true

    # ═══ Multimodal / Vision Models ═══
    vision:
      name: "llava:latest"
      description: "视觉语言模型，支持图片理解"
      context_length: 4096
      max_tokens: 2048
      temperature: 0.7
      multimodal: vision

    vision_pro:
      name: "llava-llama3:latest"
      description: "高级视觉语言模型，基于LLaMA3"
      context_length: 8192
      max_tokens: 4096
      temperature: 0.7
      multimodal: vision

    # ═══ Speech-Native / Omni Models ═══
    omni:
      name: "qwen2.5-omni:latest"
      description: "全模态模型 — 文本 + 语音 + 视觉统一理解"
      context_length: 8192
      max_tokens: 4096
      temperature: 0.7
      multimodal: full
      speech_native: true

    speech:
      name: "minimind-o:latest"
      description: "轻量语音原生模型 — 端到端语音理解与生成 (MiniMind-O)"
      context_length: 4096
      max_tokens: 2048
      temperature: 0.5
      multimodal: speech
      speech_native: true
      note: "推荐用于语音交互场景, 可替代 STT→LLM→TTS 三段式管线"

    # ═══ Audio Models ═══
    whisper:
      name: "whisper:latest"
      description: "OpenAI Whisper 语音识别模型"
      context_length: 0
      max_tokens: 0
      temperature: 0.0
      multimodal: audio
      role: stt

    sensevoice:
      name: "sensevoice:latest"
      description: "多语言语音识别模型 (SenseVoice)"
      context_length: 0
      max_tokens: 0
      temperature: 0.0
      multimodal: audio
      role: stt

  settings:
    keep_alive: "30m"
    max_loaded_models: 5
    gpu_memory_threshold: 0.85
