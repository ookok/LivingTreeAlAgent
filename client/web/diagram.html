<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>图表编辑器 — LivingTree</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/app.css">
<script src="https://unpkg.com/@antv/x6@2.18.1/dist/x6.min.js"></script>
<style>
.dgm-page{height:100vh;display:flex;flex-direction:column;overflow:hidden}
</style>
</head>
<body class="dgm-page">
<div class="page-toolbar">
  <div class="page-toolbar-left">
    <span class="page-title">📊 报告图表编辑器</span>
    <div class="app-tabs" id="dgm-tabs"></div>
  </div>
  <div class="page-toolbar-right">
    <button class="app-btn app-btn-sm" onclick="exportDiagram('png')">📸 PNG</button>
    <button class="app-btn app-btn-sm" onclick="exportDiagram('svg')">📐 SVG</button>
    <button class="app-btn app-btn-sm app-btn-primary" onclick="window.close()">完成</button>
  </div>
</div>
<div class="dgm-canvas-wrap" style="flex:1;overflow:hidden;background:#fafbfc">
  <div id="diagram-canvas" style="width:100%;height:100%"></div>
</div>

<script src="services/x6-diagram.js"></script>
<script>
const types = [
  { id:'contour', name:'污染扩散' }, { id:'process-flow', name:'工艺流程' },
  { id:'site-plan', name:'平面布置' }, { id:'noise', name:'噪声剖面' },
  { id:'monitoring', name:'监测网络' }, { id:'causal', name:'因果链' },
  { id:'risk', name:'风险矩阵' }, { id:'base-map', name:'底图标注' },
];

const tabs = document.getElementById('dgm-tabs');
tabs.innerHTML = types.map((t,i) =>
  `<span class="app-tab${i===0?' active':''}" data-type="${t.id}">${t.name}</span>`).join('');

tabs.addEventListener('click', e => {
  const tab = e.target.closest('.app-tab');
  if (!tab) return;
  tabs.querySelectorAll('.app-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  if (window._dgm) window._dgm.render(tab.dataset.type, null);
});

setTimeout(() => {
  X6Diagram.init('diagram-canvas');
  X6Diagram.render('contour', null);
  window._dgm = X6Diagram;
  window.addEventListener('resize', () => X6Diagram._graph && X6Diagram._graph.resize(
    document.getElementById('diagram-canvas').clientWidth,
    document.getElementById('diagram-canvas').clientHeight
  ));
}, 300);

function exportDiagram(fmt) {
  if (fmt === 'png') X6Diagram.exportPNG(uri => download(uri, 'png'));
  else X6Diagram.exportSVG(svg => download(new Blob([svg],{type:'image/svg+xml'}), 'svg', true));
}
function download(data, ext, isBlob) {
  const a = document.createElement('a');
  a.href = isBlob ? URL.createObjectURL(data) : data;
  a.download = `diagram-${Date.now()}.${ext}`;
  a.click();
  if (isBlob) URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
