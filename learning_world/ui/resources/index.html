<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习世界</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            font-size: 15px;
            line-height: 1.8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .welcome-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }
        
        .welcome-icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            color: #c0c0ff;
            font-size: 2em;
            margin-bottom: 16px;
            font-weight: 300;
        }
        
        .subtitle {
            color: #888;
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.8;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }
        
        .feature {
            background: #161616;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .feature:hover {
            transform: translateY(-4px);
            background: #1e1e2e;
        }
        
        .feature-icon {
            font-size: 28px;
            margin-bottom: 12px;
        }
        
        .feature-title {
            color: #a0a0ff;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .feature-desc {
            color: #666;
            font-size: 12px;
        }
        
        .hint {
            color: #555;
            font-size: 13px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #222;
        }
        
        .hint span {
            color: #6366f1;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="welcome-icon">🌌</div>
        
        <h1>学习世界</h1>
        
        <p class="subtitle">
            知识不再是孤立的答案<br>
            而是一张可以无限探索的地图
        </p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🗺️</div>
                <div class="feature-title">知识导航</div>
                <div class="feature-desc">从一个问题出发，开启无限探索之旅</div>
            </div>
            
            <div class="feature">
                <div class="feature-icon">🔗</div>
                <div class="feature-title">标签互联</div>
                <div class="feature-desc">每个答案都是新的入口，连接更多知识</div>
            </div>
            
            <div class="feature">
                <div class="feature-icon">🧠</div>
                <div class="feature-title">个性推荐</div>
                <div class="feature-desc">基于你的探索轨迹，智能推荐相关内容</div>
            </div>
        </div>
        
        <p class="hint">
            💡 在下方输入框中输入你想探索的主题<br>
            <span>点击标签</span> 即可深入了解相关内容
        </p>
    </div>
</body>
</html>
