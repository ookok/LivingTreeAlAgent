# GGUF Model Manager 企业配置文件
# 系统配置
system:
  name: "Hermes Desktop - GGUF模型管理系统"
  version: "2.0.0"
  debug: false

# 模型下载源配置
sources:
  modelscope:
    mirror: "https://mirror.modelScope.cn"
    token: "${MODELSCOPE_TOKEN}"
    cache_dir: "./models"
    max_workers: 3
    timeout: 300
  huggingface:
    mirror: "https://hf-mirror.com"
    token: "${HF_TOKEN}"
    cache_dir: "./models"
    timeout: 300

# 模型加载配置
inference:
  default_context_size: 4096
  default_n_threads: 4
  default_n_gpu_layers: 0
  batch_size: 512
  max_tokens: 2048
  temperature: 0.7
  top_p: 0.9
  repeat_penalty: 1.1
  top_k: 40

# 硬件配置适配
hardware:
  auto_detect: true
  gpu_memory_threshold: 0.8
  system_memory_threshold: 0.85
  low_memory_mode: false

# 模型推荐规则
recommendations:
  memory_to_model_ratio: 1.5
  minimal_requirements:
    qwen2.5-7b:
      memory_gb: 6
      gpu_memory_gb: 4
    qwen2.5-14b:
      memory_gb: 12
      gpu_memory_gb: 8
    llama-3.2-1b:
      memory_gb: 2
      gpu_memory_gb: 0
    llama-3.2-3b:
      memory_gb: 4
      gpu_memory_gb: 2
    mistral-7b:
      memory_gb: 6
      gpu_memory_gb: 4

# Web服务配置 (API模式)
web:
  enabled: false
  host: "0.0.0.0"
  port: 8000
  workers: 2
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"

# 安全配置
security:
  enabled: false
  api_key_header: "X-API-Key"
  rate_limit_per_minute: 60
  allowed_ips:
    - "127.0.0.1"
    - "192.168.1.0/24"
  jwt_secret: "${JWT_SECRET_KEY}"
  jwt_expire_hours: 24

# 监控配置
monitoring:
  enabled: true
  metrics_port: 9090
  prometheus_endpoint: "/metrics"
  collect_interval: 5
  alert_rules:
    memory_usage_threshold: 85
    disk_usage_threshold: 90
    gpu_usage_threshold: 95

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/gguf_manager.log"
  max_size_mb: 50
  backup_count: 5

# 评估配置
evaluation:
  enabled: false
  benchmark_datasets:
    - "hellaswag"
    - "mmlu"
  metrics:
    - "accuracy"
    - "perplexity"
    - "latency"
