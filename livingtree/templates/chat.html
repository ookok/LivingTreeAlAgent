{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>💬 与小树对话</h2>
  <div id="chat-log">
    <div class="msg assistant">
      <div class="who">小树 🌳</div>
      <div class="text">你好，我是生命之树。你可以叫我小树。我能帮你做什么？我主动学习，主动生长。</div>
    </div>
  </div>
  <form hx-post="/tree/chat/msg" hx-target="#chat-log" hx-swap="beforeend"
        hx-on::after-request="this.reset()">
    <textarea name="message" rows="3" placeholder="告诉小树你想做什么..."></textarea>
    <button type="submit" style="margin-top:8px">发送</button>
    <span class="htmx-indicator" style="margin-left:8px;color:var(--accent)">小树思考中...</span>
  </form>
</div>
{% endblock %}
