<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes 视频通话</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-900); color: white; height: 100vh; overflow: hidden; }
        .container { display: grid; grid-template-columns: 1fr 320px; height: 100vh; }
        .video-area { display: flex; flex-direction: column; background: var(--gray-800); }
        .video-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; padding: 8px; position: relative; }
        .video-container { position: relative; background: var(--gray-800); border-radius: 12px; overflow: hidden; border: 2px solid transparent; transition: border-color 0.3s; }
        .video-container.local { border-color: var(--primary); }
        .video-container.remote { border-color: var(--success); }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }
        .video-label { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
        .video-label .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
        .video-label.muted .dot { background: var(--danger); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .controls { padding: 16px; background: var(--gray-800); display: flex; justify-content: center; gap: 16px; }
        .control-btn { width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all 0.2s; }
        .control-btn.default { background: var(--gray-100); color: var(--gray-800); }
        .control-btn.default:hover { background: white; transform: scale(1.05); }
        .control-btn.danger { background: var(--danger); color: white; }
        .control-btn.danger:hover { background: #dc2626; transform: scale(1.05); }
        .control-btn.active { background: var(--danger); color: white; }
        .sidebar { background: var(--gray-800); display: flex; flex-direction: column; border-left: 1px solid var(--gray-700); }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--gray-700); }
        .room-info { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .room-badge { background: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .live-badge { background: var(--danger); padding: 4px 12px; border-radius: 20px; font-size: 12px; animation: pulse 1s infinite; }
        .participants-list { flex: 1; overflow-y: auto; padding: 8px; }
        .participant-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--gray-700); border-radius: 8px; margin-bottom: 8px; }
        .participant-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .participant-info { flex: 1; }
        .participant-name { font-weight: 500; }
        .participant-status { font-size: 12px; color: var(--gray-300); }
        .chat-area { height: 200px; border-top: 1px solid var(--gray-700); display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 12px; }
        .chat-message { margin-bottom: 12px; }
        .chat-message .author { font-size: 12px; color: var(--primary); margin-bottom: 4px; }
        .chat-message .text { background: var(--gray-700); padding: 8px 12px; border-radius: 8px; display: inline-block; }
        .chat-input-area { padding: 12px; border-top: 1px solid var(--gray-700); display: flex; gap: 8px; }
        .chat-input { flex: 1; background: var(--gray-700); border: none; padding: 12px; border-radius: 8px; color: white; }
        .chat-send { background: var(--primary); border: none; padding: 12px 16px; border-radius: 8px; color: white; cursor: pointer; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: var(--gray-800); padding: 32px; border-radius: 16px; width: 400px; max-width: 90%; }
        .modal h2 { margin-bottom: 24px; text-align: center; }
        .modal-input { width: 100%; padding: 12px 16px; margin-bottom: 16px; background: var(--gray-700); border: 2px solid var(--gray-600); border-radius: 8px; color: white; font-size: 16px; }
        .modal-input:focus { outline: none; border-color: var(--primary); }
        .modal-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 12px; }
        .modal-btn.primary { background: var(--primary); color: white; }
        .modal-btn.secondary { background: var(--gray-700); color: white; }
        .modal-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .modal-tab { flex: 1; padding: 12px; background: var(--gray-700); border: none; color: var(--gray-300); cursor: pointer; border-radius: 8px; }
        .modal-tab.active { background: var(--primary); color: white; }
        .live-controls { padding: 12px; background: var(--gray-700); display: flex; gap: 8px; }
        .live-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .live-btn.start { background: var(--danger); color: white; }
        .live-btn.stop { background: var(--gray-600); color: white; }
        .status-bar { padding: 8px 16px; background: var(--gray-700); display: flex; justify-content: space-between; font-size: 12px; color: var(--gray-300); }
        .ice-status { display: flex; gap: 16px; }
        .ice-status span { display: flex; align-items: center; gap: 4px; }
        .ice-status .ok { color: var(--success); }
        .ice-status .warn { color: var(--warning); }
        .ice-status .error { color: var(--danger); }
        .hidden { display: none !important; }

        /* Recording controls */
        .recording-panel { padding: 12px; background: var(--gray-700); border-top: 1px solid var(--gray-600); }
        .recording-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .recording-status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .recording-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .recording-duration { font-family: monospace; font-size: 14px; }
        .recording-controls { display: flex; gap: 8px; }
        .rec-btn { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .rec-btn.record { background: var(--danger); color: white; }
        .rec-btn.record:hover { background: #dc2626; }
        .rec-btn.stop-rec { background: var(--gray-600); color: white; }
        .rec-btn.stop-rec:hover { background: var(--gray-500); }
        .rec-btn.save { background: var(--success); color: white; }
        .rec-btn.save:hover { background: #16a34a; }

        /* RTMP panel */
        .rtmp-panel { padding: 12px; background: var(--gray-700); border-top: 1px solid var(--gray-600); }
        .rtmp-input { width: 100%; padding: 8px; background: var(--gray-600); border: none; border-radius: 4px; color: white; font-size: 12px; margin-bottom: 8px; }
        .rtmp-input::placeholder { color: var(--gray-300); }
        .rtmp-buttons { display: flex; gap: 8px; }
        .rtmp-btn { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; background: var(--primary); color: white; }
        .rtmp-btn:hover { background: var(--primary-dark); }
        .rtmp-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* FFmpeg status */
        .ffmpeg-status { padding: 4px 8px; background: var(--gray-600); border-radius: 4px; font-size: 11px; color: var(--gray-300); }
    </style>
</head>
<body>
    <div id="joinModal" class="modal-overlay">
        <div class="modal">
            <h2>加入视频通话</h2>
            <div class="modal-tabs">
                <button class="modal-tab active" data-tab="create">创建房间</button>
                <button class="modal-tab" data-tab="join">加入房间</button>
            </div>
            <div id="createTab">
                <input type="text" id="roomNameInput" class="modal-input" placeholder="房间名称（可选）">
                <input type="text" id="userNameInput" class="modal-input" placeholder="你的昵称">
                <button id="createRoomBtn" class="modal-btn primary">创建房间</button>
            </div>
            <div id="joinTab" class="hidden">
                <input type="text" id="roomIdInput" class="modal-input" placeholder="房间ID">
                <input type="text" id="joinUserNameInput" class="modal-input" placeholder="你的昵称">
                <button id="joinRoomBtn" class="modal-btn primary">加入</button>
            </div>
        </div>
    </div>

    <div class="container hidden" id="mainUI">
        <div class="video-area">
            <div class="status-bar">
                <div class="ice-status" id="iceStatus"><span class="ok">● ICE: 等待连接</span></div>
                <div id="networkTier">模式: --</div>
            </div>
            <div class="video-grid">
                <div class="video-container local" id="localContainer">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label" id="localLabel"><span class="dot"></span><span>本地</span></div>
                </div>
                <div class="video-container remote hidden" id="remoteContainer1">
                    <video id="remoteVideo1" autoplay playsinline></video>
                    <div class="video-label"><span class="dot"></span><span id="remoteLabel1">远程用户</span></div>
                </div>
                <div class="video-container remote hidden" id="remoteContainer2">
                    <video id="remoteVideo2" autoplay playsinline></video>
                    <div class="video-label"><span class="dot"></span><span id="remoteLabel2">远程用户</span></div>
                </div>
                <div class="video-container remote hidden" id="remoteContainer3">
                    <video id="remoteVideo3" autoplay playsinline></video>
                    <div class="video-label"><span class="dot"></span><span id="remoteLabel3">远程用户</span></div>
                </div>
            </div>
            <div class="controls">
                <button class="control-btn default" id="micBtn" title="麦克风">🎤</button>
                <button class="control-btn default" id="cameraBtn" title="摄像头">📹</button>
                <button class="control-btn default" id="screenBtn" title="共享屏幕">🖥️</button>
                <button class="control-btn default" id="liveBtn" title="开始直播">📺</button>
                <button class="control-btn danger" id="hangupBtn" title="挂断">📞</button>
            </div>
        </div>
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="room-info">
                    <span class="room-badge" id="roomBadge">房间ID</span>
                    <span class="live-badge hidden" id="liveBadge">● 直播中</span>
                </div>
                <div class="live-controls hidden" id="liveControls">
                    <button class="live-btn start" id="startLiveBtn">开始直播</button>
                    <button class="live-btn stop hidden" id="stopLiveBtn">停止直播</button>
                </div>
            </div>

            <!-- 录制控制面板 -->
            <div class="recording-panel" id="recordingPanel">
                <div class="recording-info">
                    <div class="recording-status">
                        <span class="recording-dot hidden" id="recordingDot"></span>
                        <span id="recordingLabel">本地录制</span>
                    </div>
                    <span class="recording-duration hidden" id="recordingDuration">00:00:00</span>
                </div>
                <div class="recording-controls">
                    <button class="rec-btn record" id="startRecBtn">开始录制</button>
                    <button class="rec-btn stop-rec hidden" id="stopRecBtn">停止录制</button>
                    <button class="rec-btn save hidden" id="saveRecBtn">保存</button>
                </div>
            </div>

            <!-- RTMP 推流面板 -->
            <div class="rtmp-panel" id="rtmpPanel">
                <input type="text" class="rtmp-input" id="rtmpUrlInput" placeholder="RTMP URL (例如: rtmp://localhost/live/stream)">
                <div class="rtmp-buttons">
                    <button class="rtmp-btn" id="startRtmpBtn">开始推流</button>
                    <button class="rtmp-btn" id="stopRtmpBtn" disabled>停止推流</button>
                </div>
                <div style="margin-top: 8px; font-size: 11px; color: var(--gray-300);">
                    FFmpeg状态: <span class="ffmpeg-status" id="ffmpegStatus">检测中...</span>
                </div>
            </div>
            <div class="participants-list" id="participantsList"></div>
            <div class="chat-area">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="输入消息...">
                    <button class="chat-send" id="chatSendBtn">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    const state = {
        peerId: null, roomId: null, roomName: null, userName: null,
        isAudioEnabled: true, isVideoEnabled: true, isLive: false, isRecording: false, isRtmpPushing: false,
        ws: null, pc: null, localStream: null, iceConfig: null, remoteStreams: {},
        // Recording state
        recordingStream: null, recordingChunks: [], recordingStartTime: null, recordingDuration: 0,
        // RTMP state
        rtmpUrl: null
    };
    const elements = {
        joinModal: document.getElementById('joinModal'), mainUI: document.getElementById('mainUI'),
        localVideo: document.getElementById('localVideo'),
        micBtn: document.getElementById('micBtn'), cameraBtn: document.getElementById('cameraBtn'),
        screenBtn: document.getElementById('screenBtn'), liveBtn: document.getElementById('liveBtn'),
        hangupBtn: document.getElementById('hangupBtn'),
        chatInput: document.getElementById('chatInput'), chatSendBtn: document.getElementById('chatSendBtn'),
        chatMessages: document.getElementById('chatMessages'), participantsList: document.getElementById('participantsList'),
        roomBadge: document.getElementById('roomBadge'), liveBadge: document.getElementById('liveBadge'),
        liveControls: document.getElementById('liveControls'), startLiveBtn: document.getElementById('startLiveBtn'),
        stopLiveBtn: document.getElementById('stopLiveBtn'), networkTier: document.getElementById('networkTier'),
        iceStatus: document.getElementById('iceStatus'),
        // Recording elements
        recordingPanel: document.getElementById('recordingPanel'), recordingDot: document.getElementById('recordingDot'),
        recordingLabel: document.getElementById('recordingLabel'), recordingDuration: document.getElementById('recordingDuration'),
        startRecBtn: document.getElementById('startRecBtn'), stopRecBtn: document.getElementById('stopRecBtn'),
        saveRecBtn: document.getElementById('saveRecBtn'),
        // RTMP elements
        rtmpPanel: document.getElementById('rtmpPanel'), rtmpUrlInput: document.getElementById('rtmpUrlInput'),
        startRtmpBtn: document.getElementById('startRtmpBtn'), stopRtmpBtn: document.getElementById('stopRtmpBtn'),
        ffmpegStatus: document.getElementById('ffmpegStatus')
    };

    function init() {
        setupModalTabs();
        setupEventListeners();
        setupPythonBridge();
    }

    function setupModalTabs() {
        document.querySelectorAll('.modal-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                document.getElementById('createTab').classList.toggle('hidden', tabName !== 'create');
                document.getElementById('joinTab').classList.toggle('hidden', tabName !== 'join');
            });
        });
    }

    function setupEventListeners() {
        document.getElementById('createRoomBtn').addEventListener('click', createRoom);
        document.getElementById('joinRoomBtn').addEventListener('click', joinRoom);
        elements.micBtn.addEventListener('click', toggleAudio);
        elements.cameraBtn.addEventListener('click', toggleVideo);
        elements.screenBtn.addEventListener('click', shareScreen);
        elements.liveBtn.addEventListener('click', () => elements.liveControls.classList.toggle('hidden'));
        elements.hangupBtn.addEventListener('click', hangup);
        elements.startLiveBtn.addEventListener('click', startLive);
        elements.stopLiveBtn.addEventListener('click', stopLive);
        elements.chatSendBtn.addEventListener('click', sendChatMessage);
        elements.chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(); });
        // Recording controls
        elements.startRecBtn.addEventListener('click', startRecording);
        elements.stopRecBtn.addEventListener('click', stopRecording);
        elements.saveRecBtn.addEventListener('click', saveRecording);
        // RTMP controls
        elements.startRtmpBtn.addEventListener('click', startRtmpPush);
        elements.stopRtmpBtn.addEventListener('click', stopRtmpPush);
    }

    function setupPythonBridge() {
        window.setIceConfig = setIceConfig;
        window.setRoomInfo = setRoomInfo;
        window.handleSignalingMessage = handleSignalingMessage;
        window.addChatMessage = addChatMessage;
        window.updateParticipants = updateParticipants;
        window.setConnectionStats = setConnectionStats;
        window.onPythonCreatedRoom = onPythonCreatedRoom;
        // FFmpeg / Recording
        window.onFfmpegStatus = onFfmpegStatus;
        window.onRecordingChunk = onRecordingChunk;
        window.onRtmpStatus = onRtmpStatus;
    }

    // ============ Recording Functions ============

    function startRecording() {
        if (state.isRecording) return;
        state.isRecording = true;
        state.recordingChunks = [];
        state.recordingStartTime = Date.now();

        // 发送录制开始信号到 Python
        if (window.pythonRecordingControl) {
            window.pythonRecordingControl('start', { roomId: state.roomId });
        }

        // UI 更新
        elements.recordingDot.classList.remove('hidden');
        elements.recordingDuration.classList.remove('hidden');
        elements.startRecBtn.classList.add('hidden');
        elements.stopRecBtn.classList.remove('hidden');
        elements.recordingLabel.textContent = '正在录制...';

        // 开始计时
        updateRecordingDuration();

        // 通知 Python 后端
        sendSignal({ type: 'recording_start', roomId: state.roomId });
    }

    function stopRecording() {
        if (!state.isRecording) return;
        state.isRecording = false;

        // 发送录制停止信号
        if (window.pythonRecordingControl) {
            window.pythonRecordingControl('stop', { roomId: state.roomId });
        }

        // UI 更新
        elements.recordingDot.classList.add('hidden');
        elements.stopRecBtn.classList.add('hidden');
        elements.saveRecBtn.classList.remove('hidden');
        elements.recordingLabel.textContent = '录制已停止';

        // 通知 Python 后端
        sendSignal({ type: 'recording_stop', roomId: state.roomId });
    }

    function saveRecording() {
        if (state.recordingChunks.length === 0) return;

        // 发送保存请求到 Python
        if (window.pythonSaveRecording) {
            const blob = new Blob(state.recordingChunks, { type: 'video/webm' });
            const reader = new FileReader();
            reader.onload = () => {
                const arrayBuffer = reader.result;
                window.pythonSaveRecording({
                    roomId: state.roomId,
                    duration: state.recordingDuration,
                    chunks: state.recordingChunks.length
                });
            };
            reader.readAsArrayBuffer(blob);
        }

        // 重置 UI
        elements.saveRecBtn.classList.add('hidden');
        elements.startRecBtn.classList.remove('hidden');
        elements.recordingDuration.classList.add('hidden');
        elements.recordingLabel.textContent = '本地录制';
        state.recordingChunks = [];
    }

    function updateRecordingDuration() {
        if (!state.isRecording) return;
        state.recordingDuration = Date.now() - state.recordingStartTime;
        const secs = Math.floor(state.recordingDuration / 1000);
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        const s = secs % 60;
        elements.recordingDuration.textContent =
            `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        setTimeout(updateRecordingDuration, 1000);
    }

    function onRecordingChunk(data) {
        // Python 后端传来的 chunk
        if (data && data.arrayBuffer) {
            const blob = new Blob([data.arrayBuffer], { type: 'video/webm' });
            state.recordingChunks.push(blob);
        }
    }

    // ============ RTMP Push Functions ============

    function startRtmpPush() {
        const rtmpUrl = elements.rtmpUrlInput.value.trim();
        if (!rtmpUrl) {
            alert('请输入 RTMP 地址');
            return;
        }
        state.rtmpUrl = rtmpUrl;

        if (window.pythonRtmpControl) {
            window.pythonRtmpControl('start', { url: rtmpUrl, roomId: state.roomId });
        }

        elements.startRtmpBtn.disabled = true;
        elements.stopRtmpBtn.disabled = false;
        sendSignal({ type: 'rtmp_start', url: rtmpUrl, roomId: state.roomId });
    }

    function stopRtmpPush() {
        if (window.pythonRtmpControl) {
            window.pythonRtmpControl('stop', { url: state.rtmpUrl, roomId: state.roomId });
        }

        elements.startRtmpBtn.disabled = false;
        elements.stopRtmpBtn.disabled = true;
        sendSignal({ type: 'rtmp_stop', roomId: state.roomId });
    }

    function onFfmpegStatus(info) {
        if (info.available) {
            elements.ffmpegStatus.textContent = '就绪';
            elements.ffmpegStatus.style.color = 'var(--success)';
        } else {
            elements.ffmpegStatus.textContent = '未安装';
            elements.ffmpegStatus.style.color = 'var(--danger)';
        }
    }

    function onRtmpStatus(status) {
        console.log('RTMP Status:', status);
    }

    async function createRoom() {
        const roomName = document.getElementById('roomNameInput').value.trim() || '默认房间';
        const userName = document.getElementById('userNameInput').value.trim() || '用户' + Math.random().toString(36).substr(2, 4);
        state.roomName = roomName;
        state.userName = userName;
        state.peerId = 'peer_' + Math.random().toString(36).substr(2, 8);
        if (window.pythonCreateRoom) {
            await window.pythonCreateRoom(roomName, userName, state.peerId);
        } else {
            state.roomId = 'room_' + Math.random().toString(36).substr(2, 6);
            enterRoom();
        }
    }

    function onPythonCreatedRoom(result) {
        if (result.success) {
            state.roomId = result.roomId;
            enterRoom();
        }
    }

    async function joinRoom() {
        const roomId = document.getElementById('roomIdInput').value.trim();
        const userName = document.getElementById('joinUserNameInput').value.trim() || '用户' + Math.random().toString(36).substr(2, 4);
        if (!roomId) { alert('请输入房间ID'); return; }
        state.roomId = roomId;
        state.userName = userName;
        state.peerId = 'peer_' + Math.random().toString(36).substr(2, 8);
        if (window.pythonJoinRoom) {
            const result = await window.pythonJoinRoom(roomId, userName, state.peerId);
            if (result.success) enterRoom();
        } else {
            enterRoom();
        }
    }

    async function enterRoom() {
        elements.joinModal.classList.add('hidden');
        elements.mainUI.classList.remove('hidden');
        elements.roomBadge.textContent = state.roomId;
        await startLocalStream();
        await connectWebSocket();
    }

    async function startLocalStream() {
        try {
            state.localStream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'user' }, audio: { echoCancellation: true, noiseSuppression: true } });
            elements.localVideo.srcObject = state.localStream;
        } catch (e) { console.error('无法获取媒体设备:', e); }
    }

    function toggleAudio() {
        if (!state.localStream) return;
        const audioTrack = state.localStream.getAudioTracks()[0];
        if (audioTrack) {
            state.isAudioEnabled = !state.isAudioEnabled;
            audioTrack.enabled = state.isAudioEnabled;
            elements.micBtn.classList.toggle('active', !state.isAudioEnabled);
            elements.micBtn.textContent = state.isAudioEnabled ? '🎤' : '🔇';
            sendSignal({ type: 'toggle_audio', enabled: state.isAudioEnabled });
        }
    }

    function toggleVideo() {
        if (!state.localStream) return;
        const videoTrack = state.localStream.getVideoTracks()[0];
        if (videoTrack) {
            state.isVideoEnabled = !state.isVideoEnabled;
            videoTrack.enabled = state.isVideoEnabled;
            elements.cameraBtn.classList.toggle('active', !state.isVideoEnabled);
            elements.cameraBtn.textContent = state.isVideoEnabled ? '📹' : '📷';
            sendSignal({ type: 'toggle_video', enabled: state.isVideoEnabled });
        }
    }

    async function shareScreen() {
        try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' }, audio: false });
            const videoTrack = screenStream.getVideoTracks()[0];
            const sender = state.pc?.getSenders().find(s => s.track?.kind === 'video');
            if (sender) sender.replaceTrack(videoTrack);
            videoTrack.onended = () => stopScreenShare();
        } catch (e) { console.error('屏幕共享失败:', e); }
    }

    async function stopScreenShare() {
        if (state.localStream) {
            const videoTrack = state.localStream.getVideoTracks()[0];
            const sender = state.pc?.getSenders().find(s => s.track?.kind === 'video');
            if (sender && videoTrack) sender.replaceTrack(videoTrack);
        }
    }

    function setIceConfig(config) {
        state.iceConfig = config;
        elements.networkTier.textContent = `模式: ${config.iceServers?.[0]?.urls?.[0]?.includes('stun') ? 'P2P直连' : config.iceServers?.[0]?.urls?.[0]?.includes('127.0.0.1') ? '本地中继' : '云端中继'}`;
        if (state.pc) state.pc.setConfiguration({ iceServers: config.iceServers });
    }

    function setRoomInfo(info) {
        state.roomId = info.roomId;
        state.roomName = info.roomName;
        elements.roomBadge.textContent = info.roomId;
        if (info.isLive) setLiveMode(true);
    }

    async function connectWebSocket() {
        const wsUrl = `ws://${window.location.hostname || 'localhost'}:8080/ws/${state.roomId}/${state.peerId}`;
        state.ws = new WebSocket(wsUrl);
        state.ws.onopen = () => { elements.iceStatus.innerHTML = '<span class="ok">● WS: 已连接</span>'; createPeerConnection(); };
        state.ws.onmessage = async (event) => {
            const message = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
            await handleSignalingMessage(message);
        };
        state.ws.onclose = () => elements.iceStatus.innerHTML = '<span class="error">● WS: 已断开</span>';
        state.ws.onerror = (error) => console.error('WebSocket 错误:', error);
    }

    function createPeerConnection(targetPeerId = null) {
        const config = { iceServers: state.iceConfig?.iceServers || [{ urls: 'stun:stun.l.google.com:19302' }] };
        state.pc = new RTCPeerConnection(config);
        if (state.localStream) state.localStream.getTracks().forEach(track => state.pc.addTrack(track, state.localStream));
        state.pc.onicecandidate = (event) => { if (event.candidate) sendSignal({ type: 'ice_candidate', target_peer: targetPeerId, candidate: event.candidate }); };
        state.pc.ontrack = (event) => { const remoteId = event.streams[0]?.id || targetPeerId; addRemoteStream(remoteId, event.streams[0], targetPeerId); };
        state.pc.oniceconnectionstatechange = () => { elements.iceStatus.innerHTML = `<span class="${state.pc.iceConnectionState === 'connected' || state.pc.iceConnectionState === 'completed' ? 'ok' : state.pc.iceConnectionState === 'checking' ? 'warn' : 'error'}">● ICE: ${state.pc.iceConnectionState}</span>`; };
        return state.pc;
    }

    async function handleSignalingMessage(message) {
        const { type, from_peer, sdp, candidate, target_peer } = message;
        switch (type) {
            case 'room_info': updateParticipants(message.participants || []); if (message.is_live) setLiveMode(true); break;
            case 'user_joined': if (from_peer !== state.peerId) await createAndSendOffer(from_peer); updateParticipants(message.participants || []); break;
            case 'user_left': removeRemoteStream(from_peer); updateParticipants(message.participants || []); break;
            case 'offer': await handleOffer(from_peer, sdp); break;
            case 'answer': await handleAnswer(sdp); break;
            case 'ice_candidate': await handleIceCandidate(candidate); break;
            case 'chat': addChatMessage(from_peer, message.message, message.timestamp); break;
            case 'live_started': setLiveMode(true); addSystemMessage(`${from_peer} 开始了直播`); break;
            case 'live_stopped': setLiveMode(false); addSystemMessage(`${from_peer} 停止了直播`); break;
            // Recording signals
            case 'recording_start': addSystemMessage(`${from_peer} 开始录制`); break;
            case 'recording_stop': addSystemMessage(`${from_peer} 停止录制`); break;
            // RTMP signals
            case 'rtmp_start': addSystemMessage(`${from_peer} 开始推流`); break;
            case 'rtmp_stop': addSystemMessage(`${from_peer} 停止推流`); break;
        }
    }

    async function createAndSendOffer(targetPeerId) {
        const pc = createPeerConnection(targetPeerId);
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        sendSignal({ type: 'offer', target_peer: targetPeerId, sdp: pc.localDescription });
    }

    async function handleOffer(fromPeerId, sdp) {
        const pc = createPeerConnection(fromPeerId);
        await pc.setRemoteDescription(new RTCSessionDescription(sdp));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        sendSignal({ type: 'answer', target_peer: fromPeerId, sdp: pc.localDescription });
    }

    async function handleAnswer(sdp) { if (state.pc) await state.pc.setRemoteDescription(new RTCSessionDescription(sdp)); }

    async function handleIceCandidate(candidate) {
        if (state.pc && candidate) try { await state.pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch (e) { console.error('添加 ICE 候选失败:', e); }
    }

    function sendSignal(data) { if (state.ws && state.ws.readyState === WebSocket.OPEN) state.ws.send(JSON.stringify(data)); }

    function addRemoteStream(id, stream, peerId) {
        if (state.remoteStreams[id]) return;
        state.remoteStreams[id] = { stream, peerId };
        const container = findEmptyVideoSlot();
        if (container) {
            container.querySelector('video').srcObject = stream;
            container.classList.remove('hidden');
            container.dataset.peerId = peerId;
            container.querySelector('.video-label span:last-child').textContent = peerId;
        }
    }

    function removeRemoteStream(id) {
        const info = state.remoteStreams[id];
        if (!info) return;
        document.querySelectorAll('.video-container.remote').forEach(c => { if (c.dataset.peerId === info.peerId) { c.classList.add('hidden'); c.querySelector('video').srcObject = null; delete c.dataset.peerId; } });
        delete state.remoteStreams[id];
    }

    function findEmptyVideoSlot() {
        for (const id of ['remoteContainer1', 'remoteContainer2', 'remoteContainer3']) {
            const container = document.getElementById(id);
            if (container && container.classList.contains('hidden')) return container;
        }
        return null;
    }

    let mediaRecorder = null;

    function startLive() {
        if (!state.ws) return;
        state.isLive = true;
        elements.liveBadge.classList.remove('hidden');
        elements.startLiveBtn.classList.add('hidden');
        elements.stopLiveBtn.classList.remove('hidden');
        startMediaRecorder();
        sendSignal({ type: 'live_start' });
    }

    function stopLive() {
        state.isLive = false;
        elements.liveBadge.classList.add('hidden');
        elements.stopLiveBtn.classList.add('hidden');
        elements.startLiveBtn.classList.remove('hidden');
        stopMediaRecorder();
        sendSignal({ type: 'live_stopped' });
    }

    function setLiveMode(live) { state.isLive = live; elements.liveBadge.classList.toggle('hidden', !live); }

    function startMediaRecorder() {
        if (!state.localStream) return;
        const options = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm'];
        const mimeType = options.find(type => MediaRecorder.isTypeSupported(type)) || 'video/webm';
        mediaRecorder = new MediaRecorder(state.localStream, { mimeType });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0 && state.ws && state.ws.readyState === WebSocket.OPEN) e.data.arrayBuffer().then(buffer => state.ws.send(buffer)); };
        mediaRecorder.start(1000);
    }

    function stopMediaRecorder() { if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); mediaRecorder = null; }

    function sendChatMessage() {
        const text = elements.chatInput.value.trim();
        if (!text) return;
        sendSignal({ type: 'chat', message: text, timestamp: Date.now() });
        addChatMessage(state.peerId, text, Date.now());
        elements.chatInput.value = '';
    }

    function addChatMessage(fromId, text, timestamp) {
        const isSelf = fromId === state.peerId;
        const msgEl = document.createElement('div');
        msgEl.className = 'chat-message';
        msgEl.innerHTML = `<div class="author">${isSelf ? '你' : fromId.substring(0, 8)}</div><div class="text">${escapeHtml(text)}</div>`;
        elements.chatMessages.appendChild(msgEl);
        elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
    }

    function addSystemMessage(text) {
        const msgEl = document.createElement('div');
        msgEl.className = 'chat-message';
        msgEl.innerHTML = `<div class="text" style="color: var(--gray-300); font-size: 12px;">${text}</div>`;
        elements.chatMessages.appendChild(msgEl);
    }

    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    function updateParticipants(participants) {
        elements.participantsList.innerHTML = '';
        participants.forEach(p => {
            const isSelf = p === state.peerId;
            const name = isSelf ? state.userName : p.substring(0, 8);
            const initial = (isSelf ? state.userName : name).charAt(0).toUpperCase();
            const item = document.createElement('div');
            item.className = 'participant-item';
            item.innerHTML = `<div class="participant-avatar">${initial}</div><div class="participant-info"><div class="participant-name">${name} ${isSelf ? '(你)' : ''}</div><div class="participant-status">在线</div></div>`;
            elements.participantsList.appendChild(item);
        });
    }

    function setConnectionStats(stats) { elements.iceStatus.innerHTML += `<span>延迟: ${stats.latency || '--'}ms</span>`; }

    function hangup() {
        // Stop recording if active
        if (state.isRecording) {
            stopRecording();
            saveRecording();
        }

        // Stop RTMP if active
        if (state.isRtmpPushing) {
            stopRtmpPush();
        }

        if (state.localStream) state.localStream.getTracks().forEach(t => t.stop());
        if (state.pc) { state.pc.close(); state.pc = null; }
        if (state.ws) { state.ws.close(); state.ws = null; }
        stopMediaRecorder();

        // Reset UI
        elements.startRecBtn.classList.remove('hidden');
        elements.stopRecBtn.classList.add('hidden');
        elements.saveRecBtn.classList.add('hidden');
        elements.recordingDot.classList.add('hidden');
        elements.recordingDuration.classList.add('hidden');
        elements.startRtmpBtn.disabled = false;
        elements.stopRtmpBtn.disabled = true;

        elements.mainUI.classList.add('hidden');
        elements.joinModal.classList.remove('hidden');
    }

    init();
    </script>
</body>
</html>
