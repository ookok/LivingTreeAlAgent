// LivingTree Core Protocol Buffers Schema
// 
// Replaces JSON in: P2P messages, WebSocket, REST API, MCP protocol
// Expected performance: 5-10x faster serialization, 40%+ bandwidth reduction
//
// Compile: protoc --python_out=. livingtree.proto --proto_path=protos/

syntax = "proto3";
package livingtree;


// ═══ Chat Messages ═══

message ChatRequest {
  string model = 1;
  repeated Message messages = 2;
  float temperature = 3;
  int32 max_tokens = 4;
  bool stream = 5;
  repeated string stop_sequences = 6;
  map<string, string> metadata = 7;
}

message Message {
  string role = 1;           // "system", "user", "assistant"
  string content = 2;
  repeated ImagePart images = 3;
  string name = 4;           // tool name for tool messages
}

message ImagePart {
  bytes data = 1;
  string format = 2;         // "png", "jpeg", "webp"
  string description = 3;
}

message ChatResponse {
  string id = 1;
  string model = 2;
  Message message = 3;
  int64 created = 4;
  float cost = 5;
  int32 tokens_used = 6;
  repeated ToolCall tool_calls = 7;
}

message ToolCall {
  string name = 1;
  bytes arguments = 2;       // JSON-encoded args (embedded for compatibility)
  string result = 3;
  string error = 4;
}


// ═══ P2P / Task Messages ═══

message TaskRequest {
  string task_id = 1;
  string type = 2;            // "generate", "analyze", "train", "search"
  string description = 3;
  map<string, bytes> parameters = 4;
  repeated string dependencies = 5;
  int32 priority = 6;
  int64 deadline_ms = 7;
  string source_node = 8;
}

message TaskResponse {
  string task_id = 1;
  string status = 2;          // "pending", "running", "completed", "failed"
  bytes result = 3;
  string error = 4;
  float progress = 5;         // 0.0-1.0
  int64 started_at = 6;
  int64 completed_at = 7;
  map<string, float> metrics = 8;
}


// ═══ Knowledge / Document Messages ═══

message KnowledgeMessage {
  string doc_id = 1;
  string title = 2;
  string source = 3;
  repeated Chunk chunks = 4;
  bytes embedding = 5;        // float32 array packed
  map<string, string> metadata = 6;
}

message Chunk {
  string chunk_id = 1;
  int32 index = 2;
  string text = 3;
  int32 start_char = 4;
  int32 end_char = 5;
  string section_path = 6;
  string section_id = 7;
  int32 section_level = 8;
}


// ═══ Status / Health Messages ═══

message NodeStatus {
  string node_id = 1;
  string status = 2;          // "online", "busy", "idle", "offline"
  repeated string capabilities = 3;
  float cpu_usage = 4;
  float memory_usage = 5;
  float disk_usage = 6;
  int32 active_tasks = 7;
  int64 uptime_seconds = 8;
  map<string, float> custom_metrics = 9;
}

message HealthResponse {
  string status = 1;          // "healthy", "degraded", "unhealthy"
  float version = 2;
  int64 timestamp = 3;
  repeated string warnings = 4;
  map<string, float> metrics = 5;
}


// ═══ gRPC Service Definitions ═══

service ChatService {
  rpc Chat (ChatRequest) returns (ChatResponse) {}
  rpc StreamChat (ChatRequest) returns (stream ChatResponse) {}
}

service TaskService {
  rpc SubmitTask (TaskRequest) returns (TaskResponse) {}
  rpc WatchTask (TaskRequest) returns (stream TaskResponse) {}
  rpc CancelTask (TaskRequest) returns (TaskResponse) {}
}
