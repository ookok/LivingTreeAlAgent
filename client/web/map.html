<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌳 LivingTree 地图</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/app.css">
<style>
.map-container{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}
.map-search{position:absolute;top:10px;left:10px;z-index:1000;display:flex;gap:6px}
.map-search input{width:260px;padding:8px 12px;border:1px solid var(--border-l2);border-radius:8px;background:var(--bg-menu);color:var(--text-default);font-size:13px;outline:none;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.map-search input:focus{border-color:var(--brand-default)}
.map-search button{padding:8px 14px;background:var(--brand-default);color:var(--brand-onbrand);border:none;border-radius:8px;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.map-search button:hover{background:var(--brand-hover)}
.map-legend{position:absolute;bottom:10px;right:10px;z-index:1000;background:var(--bg-menu);border-radius:8px;padding:8px 12px;font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;gap:12px}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.monitor-list{position:absolute;top:10px;right:10px;z-index:1000;background:var(--bg-menu);border-radius:8px;padding:10px;font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,.3);max-height:300px;overflow-y:auto;min-width:180px;display:none}
.monitor-list.show{display:block}
.monitor-item{padding:4px 6px;cursor:pointer;border-radius:4px;display:flex;align-items:center;gap:6px;transition:background .1s}
.monitor-item:hover{background:var(--bg-hover)}
.monitor-status{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.monitor-status.online{background:#0fdc78}
.monitor-status.offline{background:#f65a5a}
</style>
</head>
<body>
<div class="page-toolbar">
  <div class="page-toolbar-left">
    <span class="page-title">🗺️ 环境监测GIS</span>
    <button class="app-btn app-btn-sm app-btn-primary" data-layer="vec">🗺️ 天地图</button>
    <button class="app-btn app-btn-sm" data-layer="tencent">🔄 腾讯</button>
    <button class="app-btn app-btn-sm" data-layer="baidu">🔄 百度</button>
  </div>
  <div class="page-toolbar-right">
    <button class="app-btn app-btn-sm" data-action="locate">📍 定位</button>
    <button class="app-btn app-btn-sm" data-action="monitors">📡 站点</button>
    <button class="app-btn app-btn-sm" data-action="screenshot">📸 截图</button>
  </div>
</div>
<div class="map-container">
  <div class="map-search">
    <input id="map-search-input" placeholder="搜索地址或坐标..." onkeydown="if(event.key==='Enter')searchPlace()">
    <button onclick="searchPlace()">搜索</button>
  </div>
  <div id="map"></div>
  <div class="monitor-list" id="monitor-list"></div>
  <div class="map-legend">
    <div class="legend-item"><span class="legend-dot" style="background:#e8463a"></span>排放源</div>
    <div class="legend-item"><span class="legend-dot" style="background:#3f85ff"></span>监测点</div>
    <div class="legend-item"><span class="legend-dot" style="background:#0fdc78"></span>敏感目标</div>
  </div>
</div>

<script>
window._LT_MAP = {
  map: null,
  markers: [],
  monitors: [],
  sources: [],
  receptors: [],
  _provider: 'tianditu',
  _keys: {},

  async init() {
    // Fetch map keys from backend (encrypted vault)
    try {
      const [tiandituR, tencentR, baiduR] = await Promise.all([
        fetch('/api/config/tianditu_key'),
        fetch('/api/config/tencent_map_key'),
        fetch('/api/config/baidu_map_key'),
      ]);
      if (tiandituR.ok) this._keys.tianditu = (await tiandituR.json()).key || '';
      if (tencentR.ok) this._keys.tencent = (await tencentR.json()).key || '';
      if (baiduR.ok) this._keys.baidu = (await baiduR.json()).key || '';
    } catch(e) { console.warn('Map key fetch failed', e); }

    // Load real data from backend
    try {
      const resp = await fetch('/api/status');
      if (resp.ok) {
        const data = await resp.json();
        // Try to get monitoring data from status
        if (data.monitors) this.monitors = data.monitors;
        if (data.sources) this.sources = data.sources;
      }
    } catch(e) {}

    // Default coordinates if no backend data
    if (!this.monitors.length) {
      this.monitors = [
        { name: '空气站 A1', lat: 39.915, lon: 116.404, status: 'online' },
        { name: '水站 W1', lat: 39.905, lon: 116.394, status: 'online' },
      ];
    }

    if (!this._keys.tianditu && !this._keys.tencent && !this._keys.baidu) {
      console.warn('No map keys available — map will use fallback'); }
    // Load default provider (Tianditu first, then Tencent, then Baidu)
    if (this._keys.tianditu) { await this._loadTianditu(); }
    else if (this._keys.tencent) { await this._loadTencent(); }
    else if (this._keys.baidu) { await this._loadBaidu(); }
    else { this._fallbackLeaflet(); }
  },

  async switchProvider(name) {
    this._provider = name;
    document.querySelectorAll('[data-layer]').forEach(b => b.classList.remove('app-btn-primary'));
    const btn = document.querySelector(`[data-layer="${name}"]`);
    if (btn) btn.classList.add('app-btn-primary');
    // Clear map
    const mapDiv = document.getElementById('map');
    mapDiv.innerHTML = '';
    this.map = null;
    // Load provider
    if (name === 'tianditu') await this._loadTianditu();
    else if (name === 'tencent') await this._loadTencent();
    else if (name === 'baidu') await this._loadBaidu();
  },

  async _loadTianditu() {
    const tk = this._keys.tianditu || '';
    if (typeof T !== 'undefined') { this._initTianditu(tk); return; }
    const script = document.createElement('script');
    script.src = 'https://api.tianditu.gov.cn/api?v=4.0&tk=' + encodeURIComponent(tk);
    script.onload = () => this._initTianditu(tk);
    script.onerror = () => this._fallbackLeaflet();
    document.head.appendChild(script);
  },
  _initTianditu(tk) {
    this.map = new T.Map('map', { center: new T.LngLat(116.404, 39.915), zoom: 14 });
    this.map.addLayer(new T.TileLayer('https://t{s}.tianditu.gov.cn/vec_w/wmts?tk=' + encodeURIComponent(tk), { subdomains: ['0','1','2','3','4','5','6','7'] }));
    this.map.addLayer(new T.TileLayer('https://t{s}.tianditu.gov.cn/cva_w/wmts?tk=' + encodeURIComponent(tk), { subdomains: ['0','1','2','3','4','5','6','7'] }));
    this._addMarkers(); this._renderMonitorList();
  },

  async _loadTencent() {
    const key = this._keys.tencent || '';
    if (typeof qq !== 'undefined' && qq.maps) { this._initTencent(key); return; }
    const script = document.createElement('script');
    script.src = 'https://map.qq.com/api/js?v=2.exp&key=' + encodeURIComponent(key) + '&callback=_LT_MAP._initTencentCB';
    window._LT_MAP._initTencentCB = () => this._initTencent(key);
    script.onerror = () => this._fallbackLeaflet();
    document.head.appendChild(script);
  },
  _initTencent(key) {
    this.map = new qq.maps.Map(document.getElementById('map'), { center: new qq.maps.LatLng(39.915, 116.404), zoom: 14 });
    this._addMarkersQQ();
    this._renderMonitorList();
  },

  async _loadBaidu() {
    const key = this._keys.baidu || '';
    if (typeof BMap !== 'undefined') { this._initBaidu(key); return; }
    const script = document.createElement('script');
    script.src = 'https://api.map.baidu.com/api?v=3.0&ak=' + encodeURIComponent(key) + '&callback=_LT_MAP._initBaiduCB';
    window._LT_MAP._initBaiduCB = () => this._initBaidu(key);
    script.onerror = () => this._fallbackLeaflet();

    document.head.appendChild(script);
  },
  _initBaidu(key) {
    this.map = new BMap.Map('map');
    this.map.centerAndZoom(new BMap.Point(116.404, 39.915), 14);
    this.map.enableScrollWheelZoom(true);
    this._addMarkersBaidu();
    this._renderMonitorList();
  },

  _fallbackLeaflet() {
    // Fallback: display a simple coordinate grid
    const mapDiv = document.getElementById('map');
    mapDiv.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px">
        <div style="font-size:48px">🗺️</div>
        <div style="font-size:16px;color:var(--text-secondary)">天地图离线模式</div>
        <div style="font-size:13px;color:var(--text-tertiary);text-align:center;max-width:400px;line-height:1.6">
          监测点位坐标：<br>
          ${this.monitors.map(m => `${m.name}: ${m.lat}, ${m.lon}`).join('<br>')}
        </div>
      </div>`;
  },

  _addMarkers() { this._addMarkersT(); },
  _addMarkersT() {
    if (!this.map) return;
    const T = window.T;
    this.sources.forEach(s => { const m = new T.Marker(new T.LngLat(s.lon, s.lat)); m.addEventListener('click', () => alert(`${s.name}\n排放源坐标: ${s.lat}, ${s.lon}`)); this.map.addOverLay(m); });
    this.monitors.forEach(m => { const mk = new T.Marker(new T.LngLat(m.lon, m.lat)); mk.addEventListener('click', () => alert(`${m.name}\n状态: ${m.status}`)); this.map.addOverLay(mk); });
    this.receptors.forEach(r => { const mk = new T.Marker(new T.LngLat(r.lon, r.lat)); mk.addEventListener('click', () => alert(`${r.name}\n敏感目标`)); this.map.addOverLay(mk); });
  },
  _addMarkersQQ() {
    if (!this.map || !qq.maps) return;
    this.monitors.forEach(m => { new qq.maps.Marker({ map: this.map, position: new qq.maps.LatLng(m.lat, m.lon), title: m.name }); });
  },
  _addMarkersBaidu() {
    if (!this.map || !BMap) return;
    this.monitors.forEach(m => { const mk = new BMap.Marker(new BMap.Point(m.lon, m.lat)); this.map.addOverlay(mk); mk.setTitle(m.name); });
  },

  _renderMonitorList() {
    const list = document.getElementById('monitor-list');
    list.innerHTML = this.monitors.map(m => `
      <div class="monitor-item" onclick="window._LT_MAP.map.panTo(new T.LngLat(${m.lon},${m.lat}))">
        <span class="monitor-status ${m.status}"></span>
        <span>${m.name}</span>
        <span style="font-size:10px;color:var(--text-tertiary);margin-left:auto">${m.pm25 ? 'PM2.5:'+m.pm25 : m.leq ? m.leq+'dB' : ''}</span>
      </div>`).join('');
  },

  searchPlace() {
    const q = document.getElementById('map-search-input').value.trim();
    if (!q) return;
    // Try to parse as coordinates
    const coord = q.match(/(\d+\.?\d*)\s*[,，]\s*(\d+\.?\d*)/);
    if (coord) {
      const lat = parseFloat(coord[1]), lon = parseFloat(coord[2]);
      if (this.map) this.map.panTo(new T.LngLat(lon, lat));
      return;
    }
    // Geocode via Tianditu API
    fetch(`https://api.tianditu.gov.cn/geocoder?ds={"keyWord":"${encodeURIComponent(q)}"}&tk=` + encodeURIComponent(window._LT_MAP.tiandituKey || ''))
      .then(r => r.json())
      .then(data => {
        if (data && data.location) {
          const loc = data.location;
          if (this.map) this.map.panTo(new T.LngLat(loc.lon, loc.lat));
        } else {
          alert('未找到该地址');
        }
      }).catch(() => alert('搜索失败'));
  },
};

window.onload = () => window._LT_MAP.init();

// Toolbar: layer switch + actions
document.querySelector('.page-toolbar').addEventListener('click', e => {
  const layerBtn = e.target.closest('[data-layer]');
  const actionBtn = e.target.closest('[data-action]');
  const map = window._LT_MAP;

  if (layerBtn) {
    const provider = layerBtn.dataset.layer;
    if (['tianditu','tencent','baidu'].includes(provider)) {
      map.switchProvider(provider);
    }
    return;
  }
  if (!actionBtn) return;
  const action = actionBtn.dataset.action;

  if (action === 'locate') {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(p => {
        if (!map.map) return;
        const lat = p.coords.latitude, lon = p.coords.longitude;
        if (map._provider === 'tianditu') map.map.panTo(new T.LngLat(lon, lat));
        else if (map._provider === 'tencent' && qq && qq.maps) map.map.panTo(new qq.maps.LatLng(lat, lon));
        else if (map._provider === 'baidu' && BMap) map.map.panTo(new BMap.Point(lon, lat));
      });
    }
  } else if (action === 'monitors') {
    document.getElementById('monitor-list').classList.toggle('show');
  } else if (action === 'screenshot') {
    alert('截图功能：将地图当前视图保存为图片');
  }
});
</script>
</body>
</html>
