<html lang="zh-CN">

            overflow: hidden;

        }

            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);

        .logo i {
            font-size: 28px;
            color: #667eea;
        }

            padding: 12px 16px;

            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
